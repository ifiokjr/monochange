[project]
name = "monochange_app"
revision = "1.0"

[profiles.default]
DATABASE_URL = { description = "SQLite connection string", required = true }
JWT_SECRET = { description = "JWT signing secret", required = true, type = "password", generate = true }
GITHUB_CLIENT_ID = { description = "GitHub OAuth App client ID", required = true }
GITHUB_CLIENT_SECRET = { description = "GitHub OAuth App client secret", required = true, type = "password" }
GITHUB_APP_ID = { description = "GitHub App ID for installations", required = false }
GITHUB_APP_PRIVATE_KEY = { description = "GitHub App private key (PEM)", required = false, as_path = true }
OPENROUTER_API_KEY = { description = "OpenRouter API key for LLM access", required = false, type = "password" }

[profiles.production]
DATABASE_URL = { description = "Production SQLite connection string", required = true }
JWT_SECRET = { description = "Production JWT signing secret", required = true, type = "password" }
GITHUB_CLIENT_ID = { description = "Production GitHub OAuth App client ID", required = true }
GITHUB_CLIENT_SECRET = { description = "Production GitHub OAuth App client secret", required = true, type = "password" }
GITHUB_APP_ID = { description = "Production GitHub App ID for installations", required = false }
GITHUB_APP_PRIVATE_KEY = { description = "Production GitHub App private key (PEM)", required = false, as_path = true }
OPENROUTER_API_KEY = { description = "Production OpenRouter API key for LLM access", required = false, type = "password" }

[profiles.development]
DATABASE_URL = { default = "sqlite://./monochange_app.sqlite3" }
JWT_SECRET = { default = "dev-secret-change-in-production" }
GITHUB_CLIENT_ID = { description = "GitHub OAuth App client ID (dev)", default = "" }
GITHUB_CLIENT_SECRET = { description = "GitHub OAuth App client secret (dev)", type = "password", default = "" }

[profiles.ci]
DATABASE_URL = { description = "CI SQLite connection string" }
JWT_SECRET = { description = "CI JWT secret", type = "password", generate = true }
GITHUB_CLIENT_ID = { description = "CI GitHub client ID (test app)", default = "" }
GITHUB_CLIENT_SECRET = { description = "CI GitHub client secret (test app)", type = "password", default = "" }
