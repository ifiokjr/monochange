[project]
name = "monochange_app"
revision = "1.0"

[profiles.default]
DATABASE_URL = { description = "PostgreSQL connection string", required = true }
JWT_SECRET = { description = "JWT signing secret", required = true, type = "password", generate = true }
GITHUB_CLIENT_ID = { description = "GitHub OAuth App client ID", required = true }
GITHUB_CLIENT_SECRET = { description = "GitHub OAuth App client secret", required = true, type = "password" }
GITHUB_APP_ID = { description = "GitHub App ID for installations", required = false }
GITHUB_APP_PRIVATE_KEY = { description = "GitHub App private key (PEM)", required = false, as_path = true }
OPENROUTER_API_KEY = { description = "OpenRouter API key for LLM access", required = false, type = "password" }

[profiles.development]
DATABASE_URL = { default = "postgresql://postgres:postgres@localhost:5432/monochange" }
JWT_SECRET = { default = "dev-secret-change-in-production" }
GITHUB_CLIENT_ID = { description = "GitHub OAuth App client ID (dev)" }
GITHUB_CLIENT_SECRET = { description = "GitHub OAuth App client secret (dev)", type = "password" }

[profiles.ci]
DATABASE_URL = { description = "CI PostgreSQL connection string" }
JWT_SECRET = { description = "CI JWT secret", type = "password", generate = true }
GITHUB_CLIENT_ID = { description = "CI GitHub client ID (test app)" }
GITHUB_CLIENT_SECRET = { description = "CI GitHub client secret (test app)", type = "password" }
