[package]
name = "monochange_app"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[lib]
crate-type = ["cdylib", "lib"]

[[bin]]
name = "monochange_app"
path = "src/main.rs"

[dependencies]
# Leptos (available on both native and WASM)
leptos = { workspace = true, features = ["nightly"] }
leptos_meta = { workspace = true }
leptos_router = { workspace = true }
server_fn = { workspace = true }

# Shared utilities (work on WASM)
serde = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
chrono = { workspace = true }
url = { workspace = true }

# Server-only dependencies (not compiled for WASM)
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
leptos_axum = { workspace = true }
server_fn = { workspace = true, features = ["axum"] }
axum = { workspace = true }
tokio = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }
serde_json = { workspace = true }
tracing-subscriber = { workspace = true }
jsonwebtoken = { workspace = true }
axum-extra = { workspace = true }
time = { workspace = true }
reqwest = { workspace = true, features = ["json"] }
urlencoding = "2"
uuid = { workspace = true }
monochange_core = { workspace = true }
monochange_github = { workspace = true }
monochange_hosting = { workspace = true }
monochange_app_db = { path = "../monochange_app_db" }
monochange_app_api = { path = "../monochange_app_api" }
monochange_app_ai = { path = "../monochange_app_ai" }

# WASM-only dependencies (compiled only on wasm32 target)
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = { workspace = true }
web-sys = { workspace = true }
leptos-use = { workspace = true, features = ["use_window_scroll", "use_intersection_observer", "use_preferred_dark", "use_media_query", "use_element_visibility"] }
console_error_panic_hook = { workspace = true }
console_log = { workspace = true }
log = { workspace = true }

[package.metadata.leptos]
# Features enabled for the WASM (client) compilation
lib-features = ["hydrate"]

[features]
hydrate = ["leptos/hydrate"]

[dev-dependencies]
playwright-rs = "0.12"
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "macros"] }
rstest = { workspace = true }
