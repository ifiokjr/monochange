[package]
name = "monochange_app"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
publish = false
repository.workspace = true
description = "monochange web application — Leptos SSR frontend and server"

[lib]
crate-type = ["cdylib", "lib"]

[[bin]]
name = "monochange_app"
path = "src/main.rs"

[dependencies]
# Leptos (available on both native and WASM)
chrono = { workspace = true }
leptos = { workspace = true, features = ["nightly"] }
leptos_meta = { workspace = true }
leptos_router = { workspace = true }
serde = { workspace = true }
server_fn = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
url = { workspace = true }
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
leptos_axum = { workspace = true }
server_fn = { workspace = true, features = ["axum"] }
axum = { workspace = true }
tokio = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }
serde_json = { workspace = true }
tracing-subscriber = { workspace = true }
jsonwebtoken = { workspace = true }
axum-extra = { workspace = true }
time = { workspace = true }
reqwest = { workspace = true, features = ["json"] }
sqlx = { workspace = true }
urlencoding = "2"
uuid = { workspace = true }
monochange_core = { workspace = true }
monochange_github = { workspace = true }
monochange_hosting = { workspace = true }
monochange_app_db = { workspace = true }
monochange_app_automation = { workspace = true }
monochange_app_api = { workspace = true }
monochange_app_ai = { workspace = true }

# WASM-only dependencies (compiled only on wasm32 target)
[target.'cfg(target_arch = "wasm32")'.dependencies]
console_error_panic_hook = { workspace = true }
console_log = { workspace = true }
leptos-use = { workspace = true, features = ["use_window_scroll", "use_intersection_observer", "use_preferred_dark", "use_media_query", "use_element_visibility"] }
log = { workspace = true }
wasm-bindgen = { workspace = true }
web-sys = { workspace = true }
[package.metadata.leptos]
output-name = "monochange_app"
site-root = "target/site"
site-pkg-dir = "pkg"
assets-dir = "../../public"
style-file = "style/output.css"
site-addr = "127.0.0.1:3000"
reload-port = 3001
# Features enabled for the WASM (client) compilation
lib-features = ["hydrate"]
tailwind-input-file = "style/input.css"

[features]
hydrate = ["leptos/hydrate"]

[dev-dependencies]
rstest = { workspace = true }
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "macros"] }
