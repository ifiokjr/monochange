<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c8ee7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Three interlocking nodes representing packages in a monorepo -->
  <circle cx="120" cy="85" r="45" stroke="url(#g1)" stroke-width="8" fill="none" opacity="0.9"/>
  <circle cx="85" cy="155" r="45" stroke="url(#g1)" stroke-width="8" fill="none" opacity="0.9"/>
  <circle cx="155" cy="155" r="45" stroke="url(#g1)" stroke-width="8" fill="none" opacity="0.9"/>
  <!-- Central connecting dot -->
  <circle cx="120" cy="130" r="12" fill="url(#g1)"/>
  <!-- Connection lines -->
  <line x1="120" y1="100" x2="120" y2="118" stroke="url(#g1)" stroke-width="3"/>
  <line x1="100" y1="138" x2="112" y2="126" stroke="url(#g1)" stroke-width="3"/>
  <line x1="140" y1="138" x2="128" y2="126" stroke="url(#g1)" stroke-width="3"/>
</svg>
