<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <defs>
    <linearGradient id="g7" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c8ee7"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <!-- Main line evolving -->
  <path d="M30 180 L90 140 L120 130 L150 100 L210 60" stroke="url(#g7)" stroke-width="6" stroke-linecap="round" fill="none"/>
  <!-- Fork branching off -->
  <path d="M120 130 Q140 90 170 70" stroke="url(#g7)" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.7"/>
  <!-- Fork merges back -->
  <path d="M170 70 Q180 90 150 100" stroke="url(#g7)" stroke-width="3" stroke-linecap="round" fill="none" stroke-dasharray="6 4" opacity="0.5"/>
  <!-- Nodes -->
  <circle cx="30" cy="180" r="8" fill="#059669"/>
  <circle cx="90" cy="140" r="7" fill="url(#g7)"/>
  <circle cx="120" cy="130" r="9" fill="url(#g7)"/>
  <circle cx="170" cy="70" r="7" fill="url(#g7)"/>
  <circle cx="210" cy="60" r="8" fill="#0c8ee7"/>
  <!-- Merge indicator arrow -->
  <path d="M175 82 L165 92 M170 78 L160 88" stroke="#059669" stroke-width="2" stroke-linecap="round"/>
</svg>
