# =============================================================================
# [group.*] — version groups that share a single release identity
# =============================================================================
#
# When packages belong to a group, they share a synchronized version and a
# single release tag/identity. If any member bumps, all members bump to the
# group's highest severity.
#
# Required fields:
#   packages — list of [package.*] ids that belong to this group
#
# Optional fields:
#   changelog               — path or table for the group-level changelog;
#                             tables may also set `include = "all"`,
#                             `include = "group-only"`, or
#                             `include = ["package-id"]` to control which
#                             member-targeted changesets appear in the group
#                             changelog (direct group-targeted changesets are
#                             always included; default: "all")
#   excluded_changelog_types — list of changelog type keys to exclude from
#                                this target; the target inherits workspace
#                                defaults minus the listed types
#   empty_update_message    — fallback text when the group bumps but a
#                             specific member has no direct changeset entries
#   versioned_files         — additional files to version-bump with the group
#                             groups must use explicit typed entries because the
#                             ecosystem cannot be inferred from a bare string
#   tag                     — create a git tag for the group release (default: false)
#   release                 — create a provider release for the group (default: false)
#   version_format          — "namespaced" (default) or "primary"
#
# Rules:
#   - group members must be declared under [package.*]
#   - package and group ids share one namespace (no collisions)
#   - a package may belong to only one group
#   - only one package or group may use version_format = "primary"
#   - group tag/release/version_format override member package settings
#   - prefer package ids in authored changesets when possible; dependents and
#     grouped members propagate automatically, so group ids are best for
#     intentionally group-owned releases

[group.main]
packages = [
	"monochange",
	"monochange_core",
	"monochange_cargo",
	"monochange_npm",
	"monochange_config",
	"monochange_deno",
	"monochange_ecmascript",
	"monochange_dart",
	"monochange_python",
	"monochange_graph",
	"monochange_semver",
	"monochange_telemtry",
	"monochange_github",
	"monochange_gitlab",
	"monochange_gitea",
	"monochange_hosting",
	"monochange_analysis",
	"monochange_lint",
	"monochange_linting",
	"monochange_lint_testing",
	"@monochange/cli",
	"@monochange/cli-darwin-arm64",
	"@monochange/cli-darwin-x64",
	"@monochange/cli-linux-arm64-gnu",
	"@monochange/cli-linux-arm64-musl",
	"@monochange/cli-linux-x64-gnu",
	"@monochange/cli-linux-x64-musl",
	"@monochange/cli-win32-x64-msvc",
	"@monochange/cli-win32-arm64-msvc",
	"@monochange/skill",
]
tag = true
release = true
version_format = "primary"
versioned_files = [
	{ path = "Cargo.toml", type = "cargo", fields = ["workspace.package.version"] },
]
# Optional: filter member-targeted notes in the group changelog.
# Omit `include` (or set it to "all") to keep current behavior.
# Use "group-only" to show only direct group-targeted changesets.
# Use an array to allow only specific group members to contribute notes.
# include = ["monochange"]
changelog = { path = "changelog.md", format = "monochange", include = ["monochange"] }

# =============================================================================
# [changesets.verify] — changeset verification settings
# =============================================================================
#
# Controls the `AffectedPackages` CLI step which checks whether pull requests
# include changeset files that cover all changed packages.
#
# This section works independently of any source provider.

[changesets.verify]
# Whether changeset verification is enabled. When false, the AffectedPackages
# step will refuse to run.
# Default: true
enabled = true

# Whether a missing changeset is treated as a failure (true) or just a
# warning (false).
# Default: true
required = true

# Pull-request labels that skip verification entirely. When any label on the
# PR matches an entry here, the verify step returns "skipped" instead of
# evaluating coverage.
# Default: []
skip_labels = ["no-changeset-required"]

# Whether to render a failure comment body in the evaluation output for
# CI integrations to post back to the pull request.
# Default: true
comment_on_failure = true

# =============================================================================
# [lints] — manifest lint configuration
# =============================================================================
#
# Configure lint presets, path filters, and rule overrides for manifest files
# checked by `mc check`.
#
# Fields:
#   use             — preset ids to enable globally (default: [])
#   include         — optional glob patterns that opt specific manifest paths
#                     into linting; when empty, every non-gitignored manifest is
#                     eligible (default: [])
#   exclude         — glob patterns that remove matching manifest paths from
#                     linting after include/default selection (default: [])
#   disable_gitignore — when false, gitignored manifests are skipped before any
#                     include/exclude matching; set true only when you
#                     intentionally want lint coverage for ignored files
#                     (default: false)
#   rules           — explicit global rule overrides keyed by rule id
#   scopes          — scoped preset/rule overrides for a subset of lint targets
#     name          — optional label for the scope
#     match         — selector that narrows the scope to matching targets
#       ecosystems  — ecosystem ids such as cargo, npm, or dart
#       paths       — glob patterns matched against manifest paths relative to
#                     the workspace root
#       package_ids — configured package ids to target directly
#       group_ids   — configured group ids to target via group membership
#       managed     — include only managed/unmanaged packages when set
#       private     — include only private/public packages when set
#       publishable — include only publishable/non-publishable packages when set
#     use           — preset ids applied when the selector matches
#     rules         — rule overrides applied when the selector matches
#
[lints]
use = ["cargo/recommended", "npm/recommended"]
exclude = ["examples/**"]

[lints.rules]
"cargo/dependency-field-order" = "error"
"cargo/internal-dependency-workspace" = "error"
"cargo/required-package-fields" = "error"
"cargo/sorted-dependencies" = "error"
"cargo/unlisted-package-private" = "warning"
"npm/workspace-protocol" = "error"
"npm/sorted-dependencies" = "error"
"npm/required-package-fields" = "error"
"npm/root-no-prod-deps" = "error"
"npm/no-duplicate-dependencies" = "error"
"npm/unlisted-package-private" = "warning"

[[lints.scopes]]
name = "published cargo packages"
match = { ecosystems = ["cargo"], managed = true, publishable = true }
rules = { "cargo/required-package-fields" = "error" }

# =============================================================================
# [ecosystems.*] — per-ecosystem discovery and publishing settings
# =============================================================================
#
# Each supported ecosystem can be configured independently.
#
# Fields:
#   enabled  — opt-in/opt-out of discovery for this ecosystem (default: none,
#              meaning discovery runs when manifests are found)
#   roots    — restrict discovery to specific directories (default: scan entire repo)
#   exclude  — glob patterns to exclude from discovery
#   dependency_version_prefix — default dependency prefix for typed versioned_files
#   versioned_files — ecosystem-wide default versioned_files inherited by matching packages;
#                     entries may be typed manifest updates or plain-text regex replacements
#   lockfile_commands — commands that refresh ecosystem lockfiles after a
#                       release updates manifest versions; when set, inferred
#                       defaults are disabled and these commands fully own
#                       lockfile refresh for that ecosystem
#   publish          — ecosystem-wide publishing defaults inherited by matching
#                      packages unless the package overrides them
#     enabled        — enable managed publishing for the ecosystem (default: true)
#     mode           — "builtin" or "external" (default: "builtin")
#     registry       — default public registry for this ecosystem. Built-in
#                      publishing only supports the ecosystem's canonical public
#                      registry.
#     trusted_publishing — whether packages in this ecosystem should default to
#                      trusted/OIDC publishing. Set `trusted_publishing = true`
#                      for defaults, or use a table with
#                      enabled/repository/workflow/environment to inherit trust
#                      metadata into matching packages.
#     placeholder.readme / placeholder.readme_file — default placeholder README
#                      source inherited by packages during bootstrap publishing
#
# Note: roots and exclude are parsed but discovery currently scans all
# supported ecosystems regardless of these settings.

[ecosystems.cargo]
enabled = true
versioned_files = ["Cargo.toml"]

[ecosystems.npm]
enabled = true

# Uncomment to enable Deno or Dart/Flutter discovery:
# [ecosystems.deno]
# enabled = true
#
# [ecosystems.dart]
# enabled = true

# =============================================================================
# [source] — source-control provider configuration
# =============================================================================
#
# Configures the repository host for release automation: creating releases,
# opening release pull requests, and evaluating changeset policy.
#
# The [source] section configures GitHub, GitLab, or Gitea automation.
#
# Required fields:
#   provider — "github", "gitlab", or "gitea"
#   owner    — repository owner or organization
#   repo     — repository name
#
# Optional fields:
#   host    — custom host URL for self-hosted instances
#   api_url — custom API URL (e.g. for GitHub Enterprise)

[source]
provider = "github"
owner = "monochange"
repo = "monochange"

# [source.releases] — provider release settings
#
# Controls whether and how releases are created on the provider when the
# PublishRelease CLI step runs.
#
# Fields:
#   enabled        — enable/disable release creation (default: true)
#   draft          — create releases as drafts (default: false)
#   prerelease     — mark releases as pre-releases (default: false)
#   generate_notes — ask the provider to auto-generate release notes (default: false)
#   source         — release notes source: "monochange" (use monochange-rendered
#                    notes) or "github_generated" (use provider-generated notes)
#                    Default: "monochange"
[source.releases]
enabled = true
draft = false
prerelease = false
source = "monochange"

# [source.pull_requests] — release pull request settings
#
# Controls the OpenReleaseRequest CLI step which creates or updates a release
# PR with version bumps, changelog updates, and changeset cleanup.
#
# Fields:
#   enabled       — enable/disable release PR creation (default: true)
#   branch_prefix — branch name prefix for release PRs (default: "monochange/release")
#   base          — target branch for the release PR (default: "main")
#   title         — PR title template (default: "chore(release): prepare release")
#   labels           — labels applied to the release PR (default: ["release", "automated"])
#   auto_merge       — enable auto-merge on the PR when supported (default: false)
#   verified_commits — opt in to provider-verified release PR commits when supported (default: false)
[source.pull_requests]
enabled = true
branch_prefix = "monochange/release"
base = "main"
title = "chore(release): prepare release"
labels = ["release", "automated"]
auto_merge = false
verified_commits = true

# [source.bot.changesets] — changeset policy for the AffectedPackages / `mc affected` step
#
# By default, every configured package path is automatically included: any file
# change within a package's configured `path` directory triggers a changeset
# requirement for that package. You do NOT need to list package directories here.
#
# `changed_paths` below adds ADDITIONAL non-package root-level paths that should
# also trigger changeset requirements when changed. For example, workspace-level
# Cargo.toml or Cargo.lock changes affect all packages.
#
# `ignored_paths` filters out files that should NOT trigger changeset
# requirements (e.g. test files, snapshots, fixture workspaces).
#
# Per-package `ignored_paths` and `additional_paths` in [package.<id>] tables
# can further customize which files matter on a package-by-package basis.
#
# Fields:
#   enabled          — enable changeset policy (default: false)
#   required         — treat missing changesets as errors (default: true)
#   skip_labels      — PR labels that skip enforcement (default: [])
#   comment_on_failure — render a failure comment for CI (default: true)
#   changed_paths    — additional non-package paths that trigger requirements
#   ignored_paths    — glob patterns to exclude from all package matching
[source.bot.changesets]
enabled = true
required = true
skip_labels = ["no-changeset-required"]
comment_on_failure = true
changed_paths = [
	"Cargo.toml",
	"Cargo.lock",
	"codecov.yml",
]
ignored_paths = [
	"**/tests/**",
	"**/__tests.rs",
	"**/snapshots/**",
	"fixtures/tests/**",
	"crates/*/changelog.md",
	"changelog.md",
	"packages/*/changelog.md",
]

# =============================================================================
# [cli.*] — user-defined CLI commands
# =============================================================================
#
# Each [cli.<name>] table becomes a top-level `mc <name>` command.
#
# Reserved names that cannot be used: "init", "help", "version"
#
# Fields:
#   help_text — description shown in `mc --help`
#   inputs    — command-line arguments/flags
#   steps     — ordered list of step definitions to execute
#
# Input types:
#   "string"      — single string value
#   "string_list" — repeatable string value (--flag a --flag b)
#   "path"        — file path value
#   "choice"      — constrained to a set of choices
#
# Available step types:
#   Validate             — validate monochange.toml and changesets
#   Discover             — discover packages across ecosystems
#   CreateChangeFile     — create a .changeset/*.md file
#   PrepareRelease       — compute release plan, update versions, changelogs
#   CommitRelease        — create a local release commit (requires PrepareRelease)
#   PublishRelease       — create provider releases (requires PrepareRelease)
#   OpenReleaseRequest   — open/update a release PR (requires PrepareRelease)
#   CommentReleasedIssues — comment on issues referenced in changesets
#   AffectedPackages     — evaluate changeset policy from CI-supplied paths/labels
#   Command              — run an arbitrary shell command
#
# Common step fields:
#   inputs          — optional map of step-local input overrides. Values can be
#                     strings, booleans, or string arrays. Use direct template
#                     references like "{{ inputs.label }}" to forward values
#                     from command inputs without losing list/boolean types.
#
# Command step fields:
#   command         — the command to run
#   dry_run_command — alternative command for --dry-run mode (optional;
#                     if omitted, the step is skipped in dry-run)
#   shell           — run through sh -c (default: false)
#   variables       — map of placeholder → variable for interpolation
#
# Command variables: Version, GroupVersion, ReleasedPackages, ChangedFiles, Changesets
# Command templates can also use {{ inputs.name }} for CLI inputs.
# {{ version }}, {{ group_version }}, {{ released_packages }}, {{changed_files}}, {{ changesets }}

[cli.release]
help_text = "Prepare a release from discovered change files"
inputs = [
	{ name = "format", type = "choice", choices = ["text", "json"], default = "text" },
	{ name = "commit", type = "boolean", default = false },
]
steps = [
	{ type = "PrepareRelease", name = "plan release" },
	{ type = "Command", name = "generate cargo lockfile", command = "cargo generate-lockfile" },
	{ type = "Command", name = "generate pnpm lockfile", command = "pnpm install --lockfile-only" },
	{ type = "Command", name = "format changed files", command = "dprint fmt {{ changed_files }}" },
	{ type = "Command", name = "refresh shared markdown", command = "mdt update", when = "{{ inputs.commit }}" },
	{ type = "CommitRelease", name = "create release commit", when = "{{ inputs.commit }}" },
	{ type = "Command", name = "push release commit", command = "git push --no-verify", when = "{{ inputs.commit }}" },
	{ type = "PublishRelease", name = "publish hosted releases", when = "{{ inputs.commit }}" },
	{ type = "CommentReleasedIssues", name = "comment on released issues", when = "{{ inputs.commit }}" },
]

[cli.release-pr]
help_text = "Prepare a pull request release from discovered change files. It should only be run in a github action."
inputs = [
	{ name = "format", type = "choice", choices = ["text", "json", "markdown"], default = "markdown" },
	{ name = "no_verify", type = "boolean", default = true },
]
steps = [
	{ type = "PrepareRelease", name = "plan release" },
	{ type = "Command", name = "generate cargo lockfile", command = "cargo generate-lockfile" },
	{ type = "Command", name = "generate pnpm lockfile", command = "pnpm install --lockfile-only" },
	{ type = "Command", name = "format changed files", command = "dprint fmt {{ changed_files }}" },
	{ type = "Command", name = "refresh shared markdown", command = "mdt update" },
	{ type = "CommitRelease", name = "create release commit", inputs = { no_verify = "{{ inputs.no_verify }}" } },
	{ type = "OpenReleaseRequest", name = "create the pr", inputs = { no_verify = "{{ inputs.no_verify }}" } },
]

[cli.publish-release]
help_text = "Create provider releases from a durable release record"
inputs = [
	{ name = "from-ref", type = "string", default = "HEAD" },
	{ name = "draft", type = "boolean", default = false },
	{ name = "format", type = "choice", choices = ["text", "json", "markdown"], default = "text" },
]
steps = [{ name = "publish release", type = "PublishRelease" }]

[cli.comment-released-issues]
help_text = "Comment on and optionally close issues referenced in released changesets"
inputs = [
	{ name = "from-ref", type = "string", default = "HEAD" },
	{ name = "auto-close-issues", type = "boolean", default = false },
]
steps = [{ name = "comment on released issues", type = "CommentReleasedIssues" }]

[cli.publish]
help_text = "Publish packages from this release using built-in publishing workflows"
inputs = [
	{ name = "package", type = "string_list" },
	{ name = "readiness", type = "path", help_text = "JSON artifact from mc publish-readiness; required when publishing for real" },
	{ name = "resume", type = "path", help_text = "JSON result artifact from an earlier mc publish run; completed package versions are skipped" },
	{ name = "output", type = "path", help_text = "Write the package publish result JSON artifact for retry/resume" },
	{ name = "format", type = "choice", choices = ["text", "markdown", "json"], default = "text" },
]
steps = [{ name = "publish packages", type = "PublishPackages" }]
