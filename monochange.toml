[defaults]
parent_bump = "patch"
include_private = false
warn_on_group_mismatch = true
package_type = "cargo"

[defaults.changelog]
path = "{path}/changelog.md"
format = "keep_a_changelog"

[release_notes]
change_templates = ["#### $summary\n\n$details", "- $summary"]

[package.monochange]
path = "crates/monochange"

[package.monochange_core]
path = "crates/monochange_core"

[package.monochange_cargo]
path = "crates/monochange_cargo"

[package.monochange_npm]
path = "crates/monochange_npm"

[package.monochange_config]
path = "crates/monochange_config"

[package.monochange_deno]
path = "crates/monochange_deno"

[package.monochange_dart]
path = "crates/monochange_dart"

[package.monochange_graph]
path = "crates/monochange_graph"

[package.monochange_semver]
path = "crates/monochange_semver"

[package.monochange_github]
path = "crates/monochange_github"

[group.main]
packages = [
	"monochange",
	"monochange_core",
	"monochange_cargo",
	"monochange_npm",
	"monochange_config",
	"monochange_deno",
	"monochange_dart",
	"monochange_graph",
	"monochange_semver",
	"monochange_github",
]
tag = true
release = true
version_format = "primary"

[group.main.changelog]
path = "changelog.md"
format = "monochange"

[ecosystems.cargo]
enabled = true

[github]
owner = "ifiokjr"
repo = "monochange"

[github.releases]
enabled = true
draft = false
prerelease = false
source = "monochange"

[github.pull_requests]
enabled = true
branch_prefix = "monochange/release"
base = "main"
title = "chore(release): prepare release"
labels = ["release", "automated"]
auto_merge = false

[github.bot.changesets]
enabled = true
required = true
skip_labels = ["no-changeset-required"]
comment_on_failure = true
changed_paths = [
	"crates/**",
	".github/**",
	"Cargo.toml",
	"Cargo.lock",
	"devenv.nix",
	"devenv.yaml",
	"devenv.lock",
	"monochange.toml",
	"codecov.yml",
	"deny.toml",
	"scripts/**",
]
ignored_paths = [
	".changeset/**",
	"docs/**",
	"**/*.md",
	"license",
]

[[deployments]]
name = "docs"
trigger = "release_published"
workflow = "docs-release"
environment = "github-pages"
release_targets = ["main"]
requires = ["main"]
metadata = { site = "github-pages" }

[[workflows]]
name = "validate"
help_text = "Validate monochange configuration and changesets"

[[workflows.steps]]
type = "Validate"

[[workflows]]
name = "discover"
help_text = "Discover packages across supported ecosystems"

[[workflows.inputs]]
name = "format"
type = "choice"
choices = ["text", "json"]
default = "text"

[[workflows.steps]]
type = "Discover"

[[workflows]]
name = "change"
help_text = "Create a change file for one or more packages"

[[workflows.inputs]]
name = "package"
type = "string_list"
required = true

[[workflows.inputs]]
name = "bump"
type = "choice"
choices = ["patch", "minor", "major"]
default = "patch"

[[workflows.inputs]]
name = "reason"
type = "string"
required = true

[[workflows.inputs]]
name = "type"
type = "string"

[[workflows.inputs]]
name = "details"
type = "string"

[[workflows.inputs]]
name = "evidence"
type = "string_list"

[[workflows.inputs]]
name = "output"
type = "path"

[[workflows.steps]]
type = "CreateChangeFile"

[[workflows]]
name = "release"
help_text = "Prepare a release from discovered change files"

[[workflows.inputs]]
name = "format"
type = "choice"
choices = ["text", "json"]
default = "text"

[[workflows.steps]]
type = "PrepareRelease"

[[workflows]]
name = "release-manifest"
help_text = "Prepare a release and write a stable JSON manifest"

[[workflows.steps]]
type = "PrepareRelease"

[[workflows.steps]]
type = "RenderReleaseManifest"
path = ".monochange/release-manifest.json"

[[workflows]]
name = "publish-release"
help_text = "Prepare a release and publish GitHub releases"

[[workflows.inputs]]
name = "format"
type = "choice"
choices = ["text", "json"]
default = "text"

[[workflows.steps]]
type = "PrepareRelease"

[[workflows.steps]]
type = "PublishGitHubRelease"

[[workflows]]
name = "release-pr"
help_text = "Prepare a release and open or update a GitHub release pull request"

[[workflows.inputs]]
name = "format"
type = "choice"
choices = ["text", "json"]
default = "text"

[[workflows.steps]]
type = "PrepareRelease"

[[workflows.steps]]
type = "OpenReleasePullRequest"

[[workflows]]
name = "release-deploy"
help_text = "Prepare a release and emit deployment intents"

[[workflows.inputs]]
name = "format"
type = "choice"
choices = ["text", "json"]
default = "text"

[[workflows.steps]]
type = "PrepareRelease"

[[workflows.steps]]
type = "Deploy"

[[workflows]]
name = "changeset-check"
help_text = "Evaluate pull-request changeset policy"

[[workflows.inputs]]
name = "format"
type = "choice"
choices = ["text", "json"]
default = "text"

[[workflows.inputs]]
name = "changed_path"
type = "string_list"
required = true

[[workflows.inputs]]
name = "label"
type = "string_list"

[[workflows.steps]]
type = "EnforceChangesetPolicy"
