[defaults]
parent_bump = "patch"
include_private = false
warn_on_group_mismatch = true

[[version_groups]]
name = "monochange-workspace"
members = [
	"crates/monochange",
	"crates/monochange_core",
	"crates/monochange_cargo",
	"crates/monochange_npm",
	"crates/monochange_config",
	"crates/monochange_deno",
	"crates/monochange_dart",
	"crates/monochange_graph",
	"crates/monochange_semver",
]
strategy = "shared"

[ecosystems.cargo]
enabled = true

[[package_overrides]]
package = "crates/monochange"
changelog = "crates/monochange/CHANGELOG.md"

[[package_overrides]]
package = "crates/monochange_core"
changelog = "crates/monochange_core/CHANGELOG.md"

[[package_overrides]]
package = "crates/monochange_cargo"
changelog = "crates/monochange_cargo/CHANGELOG.md"

[[package_overrides]]
package = "crates/monochange_npm"
changelog = "crates/monochange_npm/CHANGELOG.md"

[[package_overrides]]
package = "crates/monochange_config"
changelog = "crates/monochange_config/CHANGELOG.md"

[[package_overrides]]
package = "crates/monochange_deno"
changelog = "crates/monochange_deno/CHANGELOG.md"

[[package_overrides]]
package = "crates/monochange_dart"
changelog = "crates/monochange_dart/CHANGELOG.md"

[[package_overrides]]
package = "crates/monochange_graph"
changelog = "crates/monochange_graph/CHANGELOG.md"

[[package_overrides]]
package = "crates/monochange_semver"
changelog = "crates/monochange_semver/CHANGELOG.md"
