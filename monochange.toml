[defaults]
parent_bump = "patch"
include_private = false
warn_on_group_mismatch = true
package_type = "cargo"
changelog = "{path}/changelog.md"

[package.monochange]
path = "crates/monochange"

[package.monochange_core]
path = "crates/monochange_core"

[package.monochange_cargo]
path = "crates/monochange_cargo"

[package.monochange_npm]
path = "crates/monochange_npm"

[package.monochange_config]
path = "crates/monochange_config"

[package.monochange_deno]
path = "crates/monochange_deno"

[package.monochange_dart]
path = "crates/monochange_dart"

[package.monochange_graph]
path = "crates/monochange_graph"

[package.monochange_semver]
path = "crates/monochange_semver"

[package.monochange_github]
path = "crates/monochange_github"

[group.main]
packages = [
	"monochange",
	"monochange_core",
	"monochange_cargo",
	"monochange_npm",
	"monochange_config",
	"monochange_deno",
	"monochange_dart",
	"monochange_graph",
	"monochange_semver",
	"monochange_github",
]
changelog = "changelog.md"
tag = true
release = true
version_format = "primary"

[ecosystems.cargo]
enabled = true

[[workflows]]
name = "validate"
help_text = "Validate monochange configuration and changesets"

[[workflows.steps]]
type = "Validate"

[[workflows]]
name = "discover"
help_text = "Discover packages across supported ecosystems"

[[workflows.inputs]]
name = "format"
type = "choice"
choices = ["text", "json"]
default = "text"

[[workflows.steps]]
type = "Discover"

[[workflows]]
name = "change"
help_text = "Create a change file for one or more packages"

[[workflows.inputs]]
name = "package"
type = "string_list"
required = true

[[workflows.inputs]]
name = "bump"
type = "choice"
choices = ["patch", "minor", "major"]
default = "patch"

[[workflows.inputs]]
name = "reason"
type = "string"
required = true

[[workflows.inputs]]
name = "evidence"
type = "string_list"

[[workflows.inputs]]
name = "output"
type = "path"

[[workflows.steps]]
type = "CreateChangeFile"

[[workflows]]
name = "release"
help_text = "Prepare a release from discovered change files"

[[workflows.inputs]]
name = "format"
type = "choice"
choices = ["text", "json"]
default = "text"

[[workflows.steps]]
type = "PrepareRelease"
