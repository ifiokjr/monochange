# =============================================================================
# monochange.toml — repository configuration for monochange
# =============================================================================
#
# This file is the single source of truth for release planning, CLI commands,
# changelog generation, and automation flows in this monorepo.
#
# Run `mc validate` to check this file against the workspace.
# Run `mc init` to generate a starter config from detected packages.

# =============================================================================
# [defaults] — repository-wide defaults applied to every package unless
# overridden at the package or group level.
# =============================================================================

[defaults]
# Bump severity applied to transitive dependents when a dependency changes.
# When package A depends on package B, and B gets a minor bump, A receives
# whichever bump is configured here.
#
# Options: "none", "patch", "minor", "major"
# Default: "patch"
parent_bump = "patch"

# Whether to include private packages (publish = false) in discovery and
# release planning. When false, private packages are discovered but excluded
# from release plans and version bumps.
#
# Default: false
include_private = false

# Emit a warning when version-group members have mismatched current versions.
# Helps catch accidental version drift in grouped packages.
#
# Default: true
warn_on_group_mismatch = true

# Default package type for all packages that don't declare their own `type`.
# Setting this avoids repeating `type = "cargo"` on every [package.*] entry.
#
# Options: "cargo", "npm", "deno", "dart", "flutter", "python"
# Default: none (each package must declare its own type)
package_type = "cargo"

# Default changelog configuration applied to every package that doesn't
# declare its own `changelog` field.
#
# Accepts three forms:
#   true                  → use "{{ path }}/CHANGELOG.md" for every package
#   false                 → disable changelogs by default
#   "{{ path }}/changelog.md" → pattern where {{ path }} is replaced with each package path
#
# As a table, you can set both path and format:
#   [defaults.changelog]
#   path = "{{ path }}/changelog.md"
#   format = "keep_a_changelog"
#
# Supported formats: "monochange" (default), "keep_a_changelog"
[defaults.changelog]
path = "{{ path }}/changelog.md"
format = "keep_a_changelog"

# Whether conflicting explicit versions from multiple changesets should fail
# validation/planning instead of warning and using the highest semver version.
#
# When false (default), monochange keeps the highest explicit version and emits
# a warning listing the conflicting changesets.
# strict_version_conflicts = false
#

# Default empty_update_message applied when a package is bumped but has no
# direct changeset entries (e.g. transitive dependency bumps or group
# synchronization). Template placeholders are interpolated at render time.
#
# Available placeholders:
#   {{ package }}, {{ package_name }}, {{ package_id }}
#   {{ group }}, {{ group_name }}, {{ group_id }}
#   {{ version }}, {{ new_version }}, {{ current_version }}, {{ previous_version }}
#   {{ bump }}, {{ trigger }}, {{ ecosystem }}
#   {{ release_owner }}, {{ release_owner_kind }}
#   {{ members }}, {{ member_count }}  (group changelogs only)
#   {{ reasons }}
#
# Precedence: package → group → defaults → built-in message
# Default: built-in message varies by grouped/ungrouped context
#
# empty_update_message = "No direct changes; {{ package }} updated to {{ version }}."

# =============================================================================
# [changelog] — workspace-wide release-note rendering settings
# =============================================================================

[changelog]
# Templates that control how individual change entries render in changelogs.
# Each template is tried in order; the first one whose required variables are
# all present wins. If none match, falls back to "- {{ summary }}".
#
# Available variables:
#   {{ summary }}       — the change summary from the changeset
#   {{ details }}       — optional multi-line details block
#   {{ package }}       — package name
#   {{ version }}       — planned version
#   {{ target_id }}     — release owner id (package or group)
#   {{ bump }}          — bump severity (none, patch, minor, major)
#   {{ type }}          — optional change type (e.g. "security", "note")
#   {{ context }}       — rendered context context block
#   {{ context }}    — alias for {{ context }}
#   {{ changeset_path }} — path to the changeset file
#   {{ change_owner }}, {{ change_owner_link }}
#   {{ review_request }}, {{ review_request_link }}
#   {{ introduced_commit }}, {{ introduced_commit_link }}
#   {{ last_updated_commit }}, {{ last_updated_commit_link }}
#   {{ related_issues }}, {{ related_issue_links }}
#   {{ closed_issues }}, {{ closed_issue_links }}
#
# Default: ["#### {{ summary }}\n\n{{ details }}", "- {{ summary }}"]
#
# Section visibility can also be controlled by priority thresholds:
#   collapse — sections with priority >= this value render inside markdown
#              <details> blocks
#   ignored  — sections with priority > this value are omitted entirely
#              and must be >= collapse
# Defaults: collapse = 127, ignored = 127 (disabled)
templates = [
	"#### {{ summary }}\n\n{{ details }}\n\n{{ context }}",
	"#### {{ summary }}\n\n{{ context }}",
	"#### {{ summary }}\n\n{{ details }}",
	"- {{ summary }}",
]

[changelog.sections]
breaking = { heading = "Breaking Change", description = "Breaking changes that require consumer updates or migration", priority = 10 }
feat = { heading = "Added", description = "New features, enhancements, and additions", priority = 20 }
change = { heading = "Changed", description = "Changes to existing behavior, functionality, or API semantics", priority = 25 }
fix = { heading = "Fixed", description = "Bug fixes and error corrections", priority = 30 }
test = { heading = "Testing", description = "Test suite improvements and additions", priority = 40 }
refactor = { heading = "Refactor", description = "Code refactoring with no functional changes", priority = 40 }
docs = { heading = "Documentation", description = "Documentation updates and improvements", priority = 40 }
security = { heading = "Security", description = "Security vulnerabilities, patches, and hardening", priority = 40 }
perf = { heading = "Performance", description = "Performance optimizations and improvements", priority = 40 }
other = { heading = "Other", description = "Miscellaneous changes not categorized elsewhere", priority = 50 }

[changelog.section_thresholds]
collapse = 127
ignored = 127

[changelog.types]
major = { bump = "major", section = "breaking", description = "Major version bump including breaking API changes requiring migration" }
breaking = { bump = "major", section = "breaking", description = "Breaking changes that require consumers to update their code" }
minor = { bump = "minor", section = "feat", description = "Minor version bump including new features and enhancements" }
feat = { bump = "minor", section = "feat", description = "New functionality or capabilities added to the package" }
change = { bump = "minor", section = "change", description = "Changes to existing behavior or API semantics" }
patch = { bump = "patch", section = "fix", description = "Patch version bump for bug fixes and small corrections" }
refactor = { bump = "patch", section = "refactor", description = "Internal code restructuring without changing external behavior" }
test = { bump = "none", section = "test", description = "Additions or improvements to the test suite only" }
fix = { bump = "patch", section = "fix", description = "Bug fixes and error corrections" }
none = { bump = "none", section = "other", description = "Changes with no version impact such as tooling or formatting" }
docs = { bump = "none", section = "docs", description = "Documentation updates and clarifications only" }
security = { bump = "none", section = "security", description = "Security improvements, advisories, and vulnerability fixes" }

# =============================================================================
# [package.*] — declare each release-managed package explicitly
# =============================================================================
#
# Required fields:
#   path  — relative path from repo root to the package directory
#
# Optional fields:
#   type                    — "cargo", "npm", "deno", "dart", "flutter"
#                             (not needed when defaults.package_type is set)
#   changelog               — true, false, "path/to/changelog.md", or a table
#                             with { path, format }; overrides [defaults.changelog]
#   excluded_changelog_types — list of changelog type keys to exclude from
#                                this target; the target inherits workspace
#                                defaults minus the listed types
#   empty_update_message    — per-package fallback text for transitive bumps
#   versioned_files         — additional files to update with the new version
#                             package-scoped string entries infer the package ecosystem,
#                             e.g. ["Cargo.toml"] or ["**/crates/*/Cargo.toml"]
#                             explicit typed entries remain supported, e.g.
#                             [{ path = "group.toml", type = "cargo" }]
#                             lockfiles can still be listed explicitly, but
#                             ecosystem-level lockfile refresh now prefers
#                             [ecosystems.<name>].lockfile_commands
#   ignore_ecosystem_versioned_files — opt out of inherited [ecosystems.<name>].versioned_files
#                             defaults for this package (default: false)
#   ignored_paths           — glob patterns for paths within this package to
#                             exclude from changeset verification
#   additional_paths        — glob patterns for paths outside the package
#                             directory that should trigger changeset verification
#   publish                 — package publishing settings; package values
#                             override inherited [ecosystems.<name>].publish
#                             defaults
#     enabled               — include this package in managed publishing
#                             flows (default: true)
#     mode                  — "builtin" for monochange-managed publishing to
#                             the default public registry for the ecosystem, or
#                             "external" when CI/scripts handle publishing
#                             themselves (default: "builtin"). npm-family
#                             workspaces use the detected workspace manager for
#                             built-in publish commands, so pnpm workspaces
#                             publish via `pnpm publish`.
#     registry              — registry override. Built-in publishing only
#                             supports the default public registry for each
#                             ecosystem: "crates_io", "npm", "jsr", or
#                             "pub_dev". Custom/private registries must use
#                             mode = "external".
#     trusted_publishing    — whether this package should use registry
#                             trusted/OIDC publishing flows when available.
#                             Set `trusted_publishing = true` for defaults, or
#                             use a table with enabled/repository/workflow/
#                             environment to override the GitHub trust context.
#     placeholder.readme    — inline README text for placeholder publishing
#     placeholder.readme_file — workspace-relative README source for
#                             placeholder publishing
#   tag                     — whether to create a git tag for this package (default: false)
#   release                 — whether to create a provider release (default: false)
#   version_format          — "namespaced" (default: "pkg/v1.0.0") or
#                             "primary" (just "v1.0.0"); only one package/group
#                             may use "primary"

[package.monochange]
path = "crates/monochange"

[package.monochange_core]
path = "crates/monochange_core"

[package.monochange_cargo]
path = "crates/monochange_cargo"

[package.monochange_npm]
path = "crates/monochange_npm"

[package.monochange_config]
path = "crates/monochange_config"

[package.monochange_deno]
path = "crates/monochange_deno"

[package.monochange_ecmascript]
path = "crates/monochange_ecmascript"

[package.monochange_dart]
path = "crates/monochange_dart"

[package.monochange_python]
path = "crates/monochange_python"

[package.monochange_graph]
path = "crates/monochange_graph"

[package.monochange_semver]
path = "crates/monochange_semver"

[package.monochange_telemtry]
path = "crates/monochange_telemtry"

[package.monochange_github]
path = "crates/monochange_github"

[package.monochange_gitlab]
path = "crates/monochange_gitlab"

[package.monochange_gitea]
path = "crates/monochange_gitea"

[package.monochange_hosting]
path = "crates/monochange_hosting"

[package.monochange_test_helpers]
path = "crates/monochange_test_helpers"
tag = false
release = false
changelog = false

[package.monochange_analysis]
path = "crates/monochange_analysis"

[package.monochange_lint]
path = "crates/monochange_lint"

[package.monochange_linting]
path = "crates/monochange_linting"

[package.monochange_lint_testing]
path = "crates/monochange_lint_testing"

[package."@monochange/skill"]
path = "packages/monochange__skill"
type = "npm"

[package."@monochange/cli"]
path = "packages/monochange__cli"
type = "npm"

[package."@monochange/cli-darwin-arm64"]
path = "packages/monochange__cli-darwin-arm64"
type = "npm"

[package."@monochange/cli-darwin-x64"]
path = "packages/monochange__cli-darwin-x64"
type = "npm"

[package."@monochange/cli-linux-arm64-gnu"]
path = "packages/monochange__cli-linux-arm64-gnu"
type = "npm"

[package."@monochange/cli-linux-arm64-musl"]
path = "packages/monochange__cli-linux-arm64-musl"
type = "npm"

[package."@monochange/cli-linux-x64-gnu"]
path = "packages/monochange__cli-linux-x64-gnu"
type = "npm"

[package."@monochange/cli-linux-x64-musl"]
path = "packages/monochange__cli-linux-x64-musl"
