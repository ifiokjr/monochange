# zizmor configuration
# https://docs.zizmor.sh/configuration/
#
# zizmor discovers this file automatically when scanning workflows.
# It is located at .github/zizmor.yml per the local discovery rules.

rules:
  template-injection:
    # Our release and publish workflows intentionally use workflow-level context
    # variables (e.g. `${{ steps.release_tag.outputs.tag }}`) in shell scripts.
    # These are generated by earlier steps, not attacker-controllable user input
    # from PRs or issues.
    ignore:
      - publish.yml
      - release.yml

  artipacked:
    # The `actions/checkout` step in release.yml and publish.yml requires
    # `persist-credentials: true` (the default) because subsequent steps use
    # `git fetch`, `git checkout`, and `gh release download` which need
    # the GitHub token to access the repository.
    ignore:
      - publish.yml
      - release.yml

  cache-poisoning:
    # The `devenv` composite action intentionally uses broad `restore-keys`
    # for Rust and cargo binary caches. This is a known trade-off documented
    # in the security audit; cache poisoning is mitigated by the fact that
    # we do not use `pull_request_target` and GitHub scopes PR cache writes
    # to merge refs only.
    ignore:
      - devenv/action.yml
