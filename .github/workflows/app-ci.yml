name: "app-ci"

on:
  push:
    branches:
      - main
    paths:
      - "apps/monochange_app/**"
  pull_request:
    paths:
      - "apps/monochange_app/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/monochange_test
  JWT_SECRET: ci-test-jwt-secret-key-123
  GITHUB_CLIENT_ID: ci-test-client-id
  GITHUB_CLIENT_SECRET: ci-test-client-secret

jobs:
  unit-tests:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: monochange_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: cargo test (unit)
        run: |
          cd apps/monochange_app
          cargo test --workspace --lib
        shell: devenv shell -- bash -e {0}

      - name: cargo test (integration)
        run: |
          cd apps/monochange_app
          cargo test --workspace --test '*' --lib --bins
        shell: devenv shell -- bash -e {0}

  check:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: install cargo-leptos
        run: |
          cd apps/monochange_app
          [ -f ~/.cargo/bin/cargo-leptos ] || cargo install cargo-leptos@0.3.6
        shell: devenv shell -- bash -e {0}

      - name: cargo check
        run: |
          cd apps/monochange_app
          cargo check --workspace
        shell: devenv shell -- bash -e {0}

      - name: cargo leptos build (frontend-only)
        run: |
          cd apps/monochange_app
          cargo leptos build --frontend-only
        shell: devenv shell -- bash -e {0}

  e2e:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    needs: [unit-tests, check]

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: monochange_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: install cargo-leptos
        run: |
          cd apps/monochange_app
          [ -f ~/.cargo/bin/cargo-leptos ] || cargo install cargo-leptos@0.3.6
        shell: devenv shell -- bash -e {0}

      - name: install playwright browsers
        run: |
          cd apps/monochange_app
          npx playwright install chromium --with-deps
        shell: devenv shell -- bash -e {0}

      - name: run end-to-end tests
        run: |
          cd apps/monochange_app
          pnpm exec playwright test
        shell: devenv shell -- bash -e {0}

  coverage:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    needs: [unit-tests]

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: monochange_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: generate coverage
        run: |
          cd apps/monochange_app
          cargo llvm-cov --workspace --lcov --output-path lcov.info
        shell: devenv shell -- bash -e {0}

      - name: upload coverage to codecov
        uses: codecov/codecov-action@v5
        with:
          working-directory: apps/monochange_app
          files: lcov.info
          flags: monochange_app
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
