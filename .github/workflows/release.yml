name: "release"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0). Must start with `v`."
        required: true
        type: string
      checkout_ref:
        description: "When true, will release the assets from the provided ref rather than the tag. Use with care."
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: true

jobs:
  upload_assets:
    env:
      CARGO_PROFILE_RELEASE_LTO: true
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 1
      CARGO_PROFILE_RELEASE_STRIP: symbols
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
    permissions:
      attestations: write
      contents: write
      id-token: write
    if: >-
      github.repository_owner == 'monochange' &&
      startsWith(inputs.tag || github.ref_name, 'v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref && github.ref_name || env.RELEASE_TAG }}

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: setup cross toolchain
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}
        if: startsWith(matrix.os, 'ubuntu') && !contains(matrix.target, '-musl')

      - name: install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross
        if: contains(matrix.target, '-musl')

      - name: set static crt linkage
        shell: bash
        run: echo "RUSTFLAGS=${RUSTFLAGS} -C target-feature=+crt-static" >> "${GITHUB_ENV}"
        if: endsWith(matrix.target, 'windows-msvc')

      - name: upload binaries
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: monochange
          manifest-path: crates/monochange/Cargo.toml
          ref: refs/tags/${{ env.RELEASE_TAG }}
          archive: $bin-$target-$tag
          target: ${{ matrix.target }}
          tar: all
          zip: windows
          token: ${{ secrets.GITHUB_TOKEN }}
          checksum: sha256,sha512

      - name: download uploaded archives for attestation
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          set -euo pipefail

          asset_dir="$RUNNER_TEMP/release-asset-attestations/$RELEASE_TARGET"
          mkdir -p "$asset_dir"

          downloaded=0
          for asset in \
            "monochange-${RELEASE_TARGET}-${RELEASE_TAG}.tar.gz" \
            "monochange-${RELEASE_TARGET}-${RELEASE_TAG}.zip"; do
            if gh release view "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --json assets \
              --jq '.assets[].name' | grep -Fx "$asset" >/dev/null; then
              gh release download "$RELEASE_TAG" \
                --repo "$GITHUB_REPOSITORY" \
                --pattern "$asset" \
                --dir "$asset_dir"
              downloaded=$((downloaded + 1))
            fi
          done

          if [ "$downloaded" -eq 0 ]; then
            echo "No release archives found for $RELEASE_TARGET and $RELEASE_TAG" >&2
            gh release view "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --json assets \
              --jq '.assets[].name' >&2
            exit 1
          fi

          echo "Downloaded release archives for attestation:"
          for archive in "$asset_dir"/*; do
            echo "$archive"
            shasum -a 256 "$archive"
          done

      - name: attest release archives
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: ${{ runner.temp }}/release-asset-attestations/${{ matrix.target }}/*

      - name: verify release archive attestations
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          set -euo pipefail

          for archive in "$RUNNER_TEMP/release-asset-attestations/$RELEASE_TARGET"/*; do
            echo "::group::Verify attestation for $(basename "$archive")"
            verified=false
            for attempt in 1 2 3 4 5; do
              if gh attestation verify "$archive" --repo "$GITHUB_REPOSITORY"; then
                verified=true
                break
              fi

              echo "Attestation not available yet for $(basename "$archive") on attempt $attempt; retrying..."
              sleep 10
            done

            if [ "$verified" != true ]; then
              echo "Failed to verify attestation for $archive" >&2
              exit 1
            fi
            echo "::endgroup::"
          done

  trigger_publish:
    needs: upload_assets
    environment: publisher
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
    permissions:
      actions: write
    if: >-
      github.repository_owner == 'monochange' &&
      startsWith(inputs.tag || github.ref_name, 'v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: trigger publish workflow
        run: |
          gh workflow run publish.yml \
            --repo "${{ github.repository }}" \
            -f "tag=${{ env.RELEASE_TAG }}"
        env:
          GH_TOKEN: ${{ github.token }}
