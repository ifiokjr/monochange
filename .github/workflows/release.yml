name: "release"

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0). Must start with `v` and have a matching GitHub release."
        required: true
        type: string
      checkout_ref:
        description: "When true, will release the assets from the provided ref rather than the tag. Use with care."
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ inputs.tag || github.event.release.tag_name }}
  cancel-in-progress: true

env:
  RELEASE_BRANCH: main

jobs:
  upload_assets:
    env:
      CARGO_PROFILE_RELEASE_LTO: true
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 1
      CARGO_PROFILE_RELEASE_STRIP: symbols
      RELEASE_TAG: ${{ inputs.tag || github.event.release.tag_name }}
    permissions:
      contents: write
    if: >-
      github.repository_owner == 'monochange' &&
      startsWith(inputs.tag || github.event.release.tag_name, 'v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref && github.ref_name || env.RELEASE_TAG }}
          fetch-depth: 0

      - name: verify release ref is on release branch
        shell: bash
        run: |
          git fetch --no-tags origin \
            "+refs/heads/${RELEASE_BRANCH}:refs/remotes/origin/${RELEASE_BRANCH}"

          tag_commit="$(git rev-parse --verify "refs/tags/${RELEASE_TAG}^{commit}")"
          branch_ref="refs/remotes/origin/${RELEASE_BRANCH}"
          checkout_commit="$(git rev-parse --verify HEAD)"

          echo "Release tag: ${RELEASE_TAG} (${tag_commit})"
          echo "Release branch: ${branch_ref} ($(git rev-parse --verify "${branch_ref}"))"
          echo "Checked out commit: ${checkout_commit}"

          if ! git merge-base --is-ancestor "${tag_commit}" "${branch_ref}"; then
            echo "::error::Release tag ${RELEASE_TAG} (${tag_commit}) is not reachable from origin/${RELEASE_BRANCH}."
            exit 1
          fi

          if ! git merge-base --is-ancestor "${checkout_commit}" "${branch_ref}"; then
            echo "::error::Checked out release source ${checkout_commit} is not reachable from origin/${RELEASE_BRANCH}."
            exit 1
          fi

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: setup cross toolchain
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}
        if: startsWith(matrix.os, 'ubuntu') && !contains(matrix.target, '-musl')

      - name: install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross
        if: contains(matrix.target, '-musl')

      - name: set static crt linkage
        shell: bash
        run: echo "RUSTFLAGS=${RUSTFLAGS} -C target-feature=+crt-static" >> "${GITHUB_ENV}"
        if: endsWith(matrix.target, 'windows-msvc')

      - name: upload binaries
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: monochange
          manifest-path: crates/monochange/Cargo.toml
          ref: refs/tags/${{ env.RELEASE_TAG }}
          archive: $bin-$target-$tag
          target: ${{ matrix.target }}
          tar: all
          zip: windows
          token: ${{ secrets.GITHUB_TOKEN }}
          checksum: sha256,sha512

  trigger_publish:
    needs: upload_assets
    environment: publisher
    env:
      RELEASE_TAG: ${{ inputs.tag || github.event.release.tag_name }}
    permissions:
      actions: write
    if: >-
      github.repository_owner == 'monochange' &&
      startsWith(inputs.tag || github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: trigger publish workflow
        run: |
          gh workflow run publish.yml \
            --repo "${{ github.repository }}" \
            -f "tag=${{ env.RELEASE_TAG }}"
        env:
          GH_TOKEN: ${{ github.token }}
