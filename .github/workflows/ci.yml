name: "ci"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: lint clippy
        run: lint:clippy
        shell: devenv shell -- bash -e {0}

      - name: lint formatting
        run: lint:format
        shell: devenv shell -- bash -e {0}

      - name: check documentation sync
        run: docs:check
        shell: devenv shell -- bash -e {0}

      - name: cargo deny
        run: deny:check
        shell: devenv shell -- bash -e {0}

  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: run cargo tests
        run: test:cargo
        shell: devenv shell -- bash -e {0}

      - name: run doc tests
        run: test:docs
        shell: devenv shell -- bash -e {0}

  build:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: build
        run: build:all
        shell: devenv shell -- bash -e {0}

      - name: build book
        run: build:book
        shell: devenv shell -- bash -e {0}

  coverage:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: run coverage
        run: coverage:all
        shell: devenv shell -- bash -e {0}

      - name: upload coverage to codecov
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: ./target/coverage/lcov.info
          disable_search: true
          fail_ci_if_error: true
          flags: rust
          name: monochange-rust-workspace
          verbose: true

  benchmark:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: run benchmarks
        run: cargo bench -p monochange --bench cli_commands -- --output-format bencher | tee target/benchmark-results.txt
        shell: devenv shell -- bash -e {0}

      - name: upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: target/benchmark-results.txt
          retention-days: 30
