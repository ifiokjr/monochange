name: "ci"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup
        uses: ./.github/actions/devenv
        with:
          activate: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: lint clippy
        run: lint:clippy

      - name: lint formatting
        run: lint:format

      - name: check architecture boundaries
        run: lint:architecture

      - name: check documentation sync
        run: docs:check

      - name: lint js
        run: node node_modules/oxlint/bin/oxlint .

      - name: cargo deny
        run: deny:check

      - name: manifest lint
        run: lint:monochange

  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup
        uses: ./.github/actions/devenv
        with:
          activate: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: run cargo tests
        run: test:cargo:expensive

      - name: run doc tests
        run: test:docs

  build:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup
        uses: ./.github/actions/devenv
        with:
          activate: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: build
        run: build:all

      - name: detect current release commit
        id: release_record
        run: |
          set -euo pipefail

          if is_release_commit="$(mc release-record --from HEAD --format json --jq '.resolvedCommit == .recordCommit' 2>/dev/null)"; then
            echo "is_release_commit=${is_release_commit}" >> "$GITHUB_OUTPUT"
          else
            echo "is_release_commit=false" >> "$GITHUB_OUTPUT"
          fi

      - name: check publish builds
        if: steps.release_record.outputs.is_release_commit != 'true'
        run: publish:check

      - name: skip publish build check on release commit
        if: steps.release_record.outputs.is_release_commit == 'true'
        run: echo "HEAD is a release commit; skipping publish:check."

      - name: build book
        run: build:book

  coverage:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    outputs:
      codecov-flags: ${{ steps.prepare-codecov-flags.outputs.flags }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: setup
        uses: ./.github/actions/devenv
        with:
          activate: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: run coverage
        env:
          CARGO_BUILD_JOBS: 1
        run: coverage:all

      - name: verify 100% patch coverage
        id: verify-patch-coverage
        if: github.event_name == 'pull_request'
        continue-on-error: true
        env:
          MONOCHANGE_PATCH_COVERAGE_BASE: ${{ github.event.pull_request.base.sha }}
          MONOCHANGE_PATCH_COVERAGE_HEAD: ${{ github.sha }}
        run: coverage:patch

      - name: prepare codecov flag reports
        id: prepare-codecov-flags
        if: always()
        run: |
          node scripts/prepare-codecov-flags.mjs \
            --lcov target/coverage/lcov.info \
            --out-dir target/coverage/flags \
            --github-output "$GITHUB_OUTPUT"

      - name: upload codecov flag reports artifact
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-artifact@v4
        with:
          name: codecov-flag-reports
          path: target/coverage/flags/*.lcov
          if-no-files-found: error
          retention-days: 7

      - name: upload coverage to codecov
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: ./target/coverage/lcov.info
          disable_search: true
          fail_ci_if_error: true
          name: monochange-rust-workspace
          verbose: true

      - name: fail when patch coverage is below target
        if: github.event_name == 'pull_request' && steps.verify-patch-coverage.outcome == 'failure'
        run: exit 1

  coverage-flags:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    needs: coverage
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        flag: ${{ fromJson(needs.coverage.outputs.codecov-flags) }}
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: download codecov flag reports artifact
        uses: actions/download-artifact@v5
        with:
          name: codecov-flag-reports
          path: target/coverage/flags

      - name: upload crate coverage flag to codecov
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: ./target/coverage/flags/${{ matrix.flag }}.lcov
          disable_search: true
          fail_ci_if_error: true
          flags: ${{ matrix.flag }}
          name: ${{ matrix.flag }}
          verbose: true

  benchmark:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup
        uses: ./.github/actions/devenv
        with:
          activate: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: run criterion benchmarks
        run: |
          mkdir -p target
          cargo bench -p monochange --bench cli_commands -- \
            --output-format bencher \
            "config_load|discover|validate|changeset_loading|prepare_release_dry_run|prepare_release_apply" \
            2>&1 | tee /tmp/bench-output.txt | grep "^test " > target/benchmark-results.txt || true
          echo "--- raw output (last 10 lines) ---"
          tail -10 /tmp/bench-output.txt
          echo "--- filtered results ---"
          cat target/benchmark-results.txt

      - name: upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: criterion-benchmark-results
          path: target/benchmark-results.txt
          retention-days: 90

  benchmark-binary:
    if: github.event_name == 'pull_request'
    timeout-minutes: 30
    runs-on: ubuntu-latest
    env:
      MONOCHANGE_ALLOW_BENCHMARK_BUDGET_FAILURES: "false"
    permissions:
      pull-requests: write
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: setup
        uses: ./.github/actions/devenv
        with:
          activate: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: build PR binary
        run: cargo build --release --bin mc && cp target/release/mc /tmp/mc-pr

      - name: build main binary
        run: |
          git stash --include-untracked
          git checkout origin/main
          cargo build --release --bin mc && cp target/release/mc /tmp/mc-main
          git checkout -
          git stash pop || true

      - name: run CLI benchmarks
        id: bench
        run: |
          .github/scripts/benchmark_cli.sh run \
            --main-bin /tmp/mc-main \
            --pr-bin /tmp/mc-pr \
            --output /tmp/benchmark-comment.md \
            --violations-output /tmp/benchmark-violations.txt

          {
            echo "results<<ENDOFBENCH"
            cat /tmp/benchmark-comment.md
            echo "ENDOFBENCH"
            echo "violations=$(cat /tmp/benchmark-violations.txt)"
          } >> "$GITHUB_OUTPUT"

      - name: comment benchmark results on PR
        if: always() && steps.bench.outcome == 'success'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: binary-benchmark
          message: ${{ steps.bench.outputs.results }}

      - name: fail on phase budget regressions
        if: always() && steps.bench.outcome == 'success' && env.MONOCHANGE_ALLOW_BENCHMARK_BUDGET_FAILURES != 'true'
        run: |
          if [ "${{ steps.bench.outputs.violations }}" -gt 0 ]; then
            echo "benchmark phase budget regressions detected: ${{ steps.bench.outputs.violations }}"
            exit 1
          fi

  release-pr-manual-merge-blocker:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
    steps:
      - name: block direct merge of release branches
        uses: monochange/actions/fail-when@v0
        with:
          should-fail: ${{ startsWith(github.head_ref, 'monochange/release/') }}
          reason: Release branches must be merged via the /merge comment workflow.
          fail-comment: |
            This check fails intentionally so GitHub's normal merge button cannot be used for release PRs.

            After every required check is green, comment `/merge` on this PR or run the `release-pr-merge` workflow. That workflow fast-forwards the release branch and preserves monochange's release history invariants.

  release-pr:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository_owner == 'monochange'
    timeout-minutes: 20
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: setup
        uses: ./.github/actions/devenv
        with:
          activate: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: configure git
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_MERGE_TOKEN }}
        run: |
          set -euo pipefail
          user_info="$(gh api user --jq '{id: .id, login: .login, name: .name}')"
          user_id="$(echo "$user_info" | jq -r '.id')"
          user_login="$(echo "$user_info" | jq -r '.login')"
          user_name="$(echo "$user_info" | jq -r '.name // .login')"
          git config user.name "$user_name"
          git config user.email "${user_id}+${user_login}@users.noreply.github.com"

      - name: refresh tags from origin
        run: git fetch --force --tags origin

      - name: detect current release commit
        id: release_record
        run: |
          set -euo pipefail

          if is_release_commit="$(mc release-record --from HEAD --format json --jq '.resolvedCommit == .recordCommit' 2>/dev/null)"; then
            echo "is_release_commit=${is_release_commit}" >> "$GITHUB_OUTPUT"
          else
            echo "is_release_commit=false" >> "$GITHUB_OUTPUT"
          fi

      - name: refresh release pull request
        if: steps.release_record.outputs.is_release_commit != 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_MERGE_TOKEN }}
        run: mc --log-level=debug release-pr

      - name: skip refresh on merged release commit
        if: steps.release_record.outputs.is_release_commit == 'true'
        run: echo "HEAD is already a merged release commit; skipping release PR refresh."

  release-post-merge:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository_owner == 'monochange'
    needs: release-pr
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      issues: write
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: setup
        uses: ./.github/actions/devenv
        with:
          activate: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: detect release commit and create tags
        id: tag_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if is_release_commit="$(mc release-record --from HEAD --format json --jq '.resolvedCommit == .recordCommit' 2>/dev/null)"; then
            echo "is_release_commit=${is_release_commit}" >> "$GITHUB_OUTPUT"
            if [ "${is_release_commit}" = "true" ]; then
              mc tag-release --from HEAD --push=true --format json | tee /tmp/tag-report.json
            fi
          else
            echo "is_release_commit=false" >> "$GITHUB_OUTPUT"
          fi

      - name: create draft releases
        if: steps.tag_release.outputs.is_release_commit == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mc publish-release --from-ref="HEAD" --draft --format json | tee /tmp/publish-release.json

      - name: comment on released issues
        if: steps.tag_release.outputs.is_release_commit == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mc comment-released-issues --from-ref="HEAD" --auto-close-issues

      - name: trigger release workflow
        if: steps.tag_release.outputs.is_release_commit == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="$(jq -r '.groupVersion.tag // empty' /tmp/tag-report.json)"
          if [ -z "$tag" ]; then
            echo "No tag found in tag-report.json, skipping release trigger"
            exit 0
          fi
          echo "Triggering release workflow for tag $tag"
          gh workflow run release.yml \
            --repo "${{ github.repository }}" \
            -f "tag=$tag"
