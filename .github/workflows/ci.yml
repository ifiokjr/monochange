name: "ci"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: lint clippy
        run: lint:clippy
        shell: devenv shell -- bash -e {0}

      - name: lint formatting
        run: lint:format
        shell: devenv shell -- bash -e {0}

      - name: check architecture boundaries
        run: lint:architecture
        shell: devenv shell -- bash -e {0}

      - name: check documentation sync
        run: docs:check
        shell: devenv shell -- bash -e {0}

      - name: cargo deny
        run: deny:check
        shell: devenv shell -- bash -e {0}

      - name: manifest lint
        run: lint:monochange
        shell: devenv shell -- bash -e {0}

  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: run cargo tests
        run: test:cargo:expensive
        shell: devenv shell -- bash -e {0}

      - name: run doc tests
        run: test:docs
        shell: devenv shell -- bash -e {0}

  build:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: build
        run: build:all
        shell: devenv shell -- bash -e {0}

      - name: check publish builds
        run: publish:check
        shell: devenv shell -- bash -e {0}

      - name: build book
        run: build:book
        shell: devenv shell -- bash -e {0}

  coverage:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: run coverage
        run: coverage:all
        shell: devenv shell -- bash -e {0}

      - name: verify 100% patch coverage
        if: github.event_name == 'pull_request'
        env:
          MONOCHANGE_PATCH_COVERAGE_BASE: ${{ github.event.pull_request.base.sha }}
          MONOCHANGE_PATCH_COVERAGE_HEAD: ${{ github.sha }}
        run: coverage:patch
        shell: devenv shell -- bash -e {0}

      - name: upload coverage to codecov
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: ./target/coverage/lcov.info
          disable_search: true
          fail_ci_if_error: true
          flags: rust
          name: monochange-rust-workspace
          verbose: true

  benchmark:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: run criterion benchmarks
        run: |
          mkdir -p target
          cargo bench -p monochange --bench cli_commands -- \
            --output-format bencher \
            "config_load|discover|validate|changeset_loading|prepare_release_dry_run|prepare_release_apply" \
            2>&1 | tee /tmp/bench-output.txt | grep "^test " > target/benchmark-results.txt || true
          echo "--- raw output (last 10 lines) ---"
          tail -10 /tmp/bench-output.txt
          echo "--- filtered results ---"
          cat target/benchmark-results.txt
        shell: devenv shell -- bash -e {0}

      - name: upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: criterion-benchmark-results
          path: target/benchmark-results.txt
          retention-days: 90

  benchmark-binary:
    if: github.event_name == 'pull_request'
    timeout-minutes: 30
    runs-on: ubuntu-latest
    env:
      MONOCHANGE_ALLOW_BENCHMARK_BUDGET_FAILURES: "false"
    permissions:
      pull-requests: write
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: build PR binary
        run: cargo build --release --bin mc && cp target/release/mc /tmp/mc-pr
        shell: devenv shell -- bash -e {0}

      - name: build main binary
        run: |
          git stash --include-untracked
          git checkout origin/main
          cargo build --release --bin mc && cp target/release/mc /tmp/mc-main
          git checkout -
          git stash pop || true
        shell: devenv shell -- bash -e {0}

      - name: run CLI benchmarks
        id: bench
        run: |
          .github/scripts/benchmark_cli.sh run \
            --main-bin /tmp/mc-main \
            --pr-bin /tmp/mc-pr \
            --output /tmp/benchmark-comment.md \
            --violations-output /tmp/benchmark-violations.txt

          {
            echo "results<<ENDOFBENCH"
            cat /tmp/benchmark-comment.md
            echo "ENDOFBENCH"
            echo "violations=$(cat /tmp/benchmark-violations.txt)"
          } >> "$GITHUB_OUTPUT"
        shell: devenv shell -- bash -e {0}

      - name: comment benchmark results on PR
        if: always() && steps.bench.outcome == 'success'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: binary-benchmark
          message: ${{ steps.bench.outputs.results }}

      - name: fail on phase budget regressions
        if: always() && steps.bench.outcome == 'success' && env.MONOCHANGE_ALLOW_BENCHMARK_BUDGET_FAILURES != 'true'
        run: |
          if [ "${{ steps.bench.outputs.violations }}" -gt 0 ]; then
            echo "benchmark phase budget regressions detected: ${{ steps.bench.outputs.violations }}"
            exit 1
          fi
        shell: devenv shell -- bash -e {0}
