name: "publish"

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (for example `v0.1.0`)."
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ inputs.tag || github.run_id }}
  cancel-in-progress: true

jobs:
  publish:
    environment: publisher
    permissions:
      actions: read
      contents: read
      id-token: write
    if: >-
      github.repository_owner == 'monochange'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: resolve release tag
        id: release_tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG='${{ inputs.tag }}'

          repo_url="https://github.com/${GITHUB_REPOSITORY}.git"

          # Validate the tag exists on the remote before proceeding. This step
          # runs before checkout, so use the repository URL instead of `origin`.
          if ! git ls-remote --exit-code --tags "$repo_url" "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag '$TAG' does not exist on the remote" >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $TAG"

      - name: checkout current monochange cli
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.release_tag.outputs.tag }}
          fetch-depth: 0

      - name: verify tag checkout
        shell: bash
        run: |
          set -euo pipefail
          expected_tag="${{ steps.release_tag.outputs.tag }}"
          actual_commit=$(git rev-parse HEAD)
          tag_commit=$(git rev-list -n1 "$expected_tag")
          if [ "$actual_commit" != "$tag_commit" ]; then
            echo "::error::Checked-out commit $actual_commit does not match tag $expected_tag ($tag_commit)" >&2
            exit 1
          fi

          # Ensure the tag has been merged into main (prevents orphaned/release-branch tags)
          if ! git merge-base --is-ancestor "$actual_commit" refs/remotes/origin/main 2>/dev/null; then
            echo "::error::Tag $expected_tag ($actual_commit) is not on the main branch" >&2
            exit 1
          fi

          echo "Verified: checked-out commit matches tag $expected_tag and is on main"

      - name: setup current monochange cli
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: build current monochange cli
        run: |
          cargo build --release --package monochange --bin mc
          mkdir -p "$RUNNER_TEMP/bin"
          cp target/release/mc "$RUNNER_TEMP/bin/mc"
        shell: devenv shell -- bash -e {0}

      - name: get crates oidc auth token
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: crates-oidc

      - name: download release assets
        if: startsWith( steps.release_tag.outputs.tag , 'v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          mkdir -p "$RUNNER_TEMP/release-assets"
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "monochange-*-${RELEASE_TAG}.tar.gz" \
            --pattern "monochange-*-${RELEASE_TAG}.zip" \
            --dir "$RUNNER_TEMP/release-assets"
        shell: devenv shell -- bash -e {0}

      - name: populate cli npm packages with release binaries
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          pnpm node scripts/npm/build-packages.mjs \
            --release-tag "$RELEASE_TAG" \
            --assets-dir "$RUNNER_TEMP/release-assets"
          pnpm node scripts/npm/populate-packages.mjs \
            --packages-dir packages
        shell: devenv shell -- bash -e {0}

      - name: check publish readiness
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-oidc.outputs.token }}
        run: |
          "$RUNNER_TEMP/bin/mc" publish-readiness \
            --from HEAD \
            --output "$RUNNER_TEMP/publish-readiness.json" \
            --format json
        shell: devenv shell -- bash -e {0}

      - name: setup cargo stable for publish
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: setup node for publish
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: install pnpm for publish
        uses: pnpm/action-setup@739bfe42ca9233c5e6aca07c1a25a9d34aca49b0 # v6.0.7
        with:
          version: 10

      - name: publish packages
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-oidc.outputs.token }}
        run: |
          "$RUNNER_TEMP/bin/mc" step:publish-packages \
            --log-level info \
            --all \
            --output "$RUNNER_TEMP/publish-result.json" \
            --format json
        shell: bash
