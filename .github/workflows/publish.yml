name: "publish"

on:
  push:
    tags:
      - "@monochange/skill/**"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish to npm (for example `v0.1.0`)."
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ inputs.tag || github.run_id }}
  cancel-in-progress: true

jobs:
  publish:
    environment: publisher
    permissions:
      actions: read
      contents: read
      id-token: write
    if: >-
      github.repository_owner == 'ifiokjr'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: resolve release tag
        id: release_tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG='${{ inputs.tag }}'
          elif [ "${{ github.event_name }}" = "push" ]; then
            TAG='${{ github.ref_name }}'
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $TAG"

      - name: checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release_tag.outputs.tag }}

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: download release assets
        if: startsWith( steps.release_tag.outputs.tag , 'v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          mkdir -p "$RUNNER_TEMP/release-assets"
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "monochange-*-${RELEASE_TAG}.tar.gz" \
            --pattern "monochange-*-${RELEASE_TAG}.zip" \
            --dir "$RUNNER_TEMP/release-assets"

      - name: get crates oidc auth token
        uses: rust-lang/crates-io-auth-action@v1
        id: crates-oidc

      - name: publish unreleased packages
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-oidc.outputs.token }}
        run: mc publish
        shell: devenv shell -- bash -e {0}

      - name: build cli npm packages
        if: startsWith( steps.release_tag.outputs.tag , 'v')
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          node scripts/npm/build-packages.mjs \
            --version "$VERSION" \
            --release-tag "$RELEASE_TAG" \
            --assets-dir "$RUNNER_TEMP/release-assets" \
            --out-dir "$RUNNER_TEMP/npm-packages"
        shell: devenv shell -- bash -e {0}

      - name: publish cli npm packages
        if: startsWith( steps.release_tag.outputs.tag , 'v')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          node scripts/npm/publish-packages.mjs \
            --packages-dir "$RUNNER_TEMP/npm-packages"
        shell: devenv shell -- bash -e {0}
