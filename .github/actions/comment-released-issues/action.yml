name: comment-released-issues
description: "Comment on and optionally close issues referenced in released changesets"
inputs:
  github-token:
    description: "GitHub token for API access"
    required: true
  from-ref:
    description: "Git ref to discover the release record from"
    required: false
    default: "HEAD"
  auto-close-issues:
    description: "Whether to close issues not already closed by PR references"
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: setup
      uses: ./.github/actions/devenv
      with:
        github-token: ${{ inputs.github-token }}

    - name: comment on released issues
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      shell: devenv shell -- bash -e {0}
      run: |
        set -euo pipefail
        mc comment-released-issues \
          --from-ref="${{ inputs.from-ref }}" \
          --auto-close-issues="${{ inputs.auto-close-issues }}"
