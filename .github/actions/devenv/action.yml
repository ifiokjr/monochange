name: devenv
description: "Setup development environment with devenv"
inputs:
  github-token:
    description: Provide a github token
    required: true
  cache-version:
    description: The version of the cache to use.
    required: false
    default: "v1"
  activate:
    description: Whether to activate the devenv environment for the entire job.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: cache rust dependencies
      id: cache-rust-dependencies
      continue-on-error: true
      uses: Swatinem/rust-cache@v2
      with:
        prefix-key: "${{ inputs.cache-version }}"

    - name: retry cache rust dependencies
      if: steps.cache-rust-dependencies.outcome != 'success'
      uses: Swatinem/rust-cache@v2
      with:
        prefix-key: "${{ inputs.cache-version }}"

    - name: cache cargo binaries
      id: cache-cargo-binaries
      continue-on-error: true
      uses: actions/cache@v5
      with:
        path: ./.bin
        key: ${{ runner.os }}-cargo-bin-${{ inputs.cache-version }}-${{ env.RUSTUP_TOOLCHAIN }}-${{ hashFiles('rust-toolchain.toml', 'Cargo.toml') }}
        restore-keys: |
          ${{ runner.os }}-cargo-bin-${{ inputs.cache-version }}-

    - name: retry cache cargo binaries
      if: steps.cache-cargo-binaries.outcome != 'success'
      uses: actions/cache@v5
      with:
        path: ./.bin
        key: ${{ runner.os }}-cargo-bin-${{ inputs.cache-version }}-${{ env.RUSTUP_TOOLCHAIN }}-${{ hashFiles('rust-toolchain.toml', 'Cargo.toml') }}
        restore-keys: |
          ${{ runner.os }}-cargo-bin-${{ inputs.cache-version }}-

    - name: install nix
      id: install-nix
      continue-on-error: true
      uses: cachix/install-nix-action@v31
      with:
        github_access_token: ${{ inputs.github-token }}

    - name: retry install nix
      if: steps.install-nix.outcome != 'success'
      uses: cachix/install-nix-action@v31
      with:
        github_access_token: ${{ inputs.github-token }}

    - name: setup nix environment
      shell: bash
      run: |
        set -euo pipefail

        max_attempts=3
        for attempt in $(seq 1 "$max_attempts"); do
          if nix profile add --accept-flake-config nixpkgs#cachix && \
            cachix use devenv && \
            nix profile add nixpkgs#devenv; then
            break
          fi

          if [ "$attempt" -eq "$max_attempts" ]; then
            echo "::error::Failed to set up nix environment after $attempt attempts"
            exit 1
          fi

          sleep_seconds=$((attempt * 10))
          echo "::warning::setup nix environment failed (attempt $attempt/$max_attempts). Retrying in ${sleep_seconds}s..."
          sleep "$sleep_seconds"
        done

    - name: load devenv environment
      shell: bash
      if: inputs.activate == 'true'
      run: |
        # Dump the devenv environment into KEY=VALUE format.
        # Skip PATH, empty lines, and Nix-specific vars that would
        # break host binaries (e.g. /usr/bin/env) when child
        # processes inherit LD_LIBRARY_PATH from a Nix glibc.
        devenv shell -- env | while IFS= read -r line; do
          [[ "$line" =~ ^PATH= ]] && continue
          [[ "$line" =~ ^(LD_LIBRARY_PATH|LD_PRELOAD|LD_AUDIT|NIX_LD|NIX_LD_LIBRARY_PATH|NIX_CFLAGS_COMPILE|NIX_LDFLAGS)= ]] && continue
          [[ -z "$line" ]] && continue
          echo "$line" >> "$GITHUB_ENV"
        done

        # Extract PATH additions and write them to GITHUB_PATH
        devenv shell -- printenv PATH | tr ':' '\n' | while read -r dir; do
          [[ -d "$dir" ]] && echo "$dir" >> "$GITHUB_PATH"
        done

    - name: install dependencies
      shell: bash
      run: |
        set -euo pipefail

        max_attempts=3
        for attempt in $(seq 1 "$max_attempts"); do
          if devenv shell install:cargo:bin; then
            break
          fi

          if [ "$attempt" -eq "$max_attempts" ]; then
            echo "::error::install:cargo:bin failed after $attempt attempts"
            exit 1
          fi

          sleep_seconds=$((attempt * 10))
          echo "::warning::install:cargo:bin failed (attempt $attempt/$max_attempts). Retrying in ${sleep_seconds}s..."
          sleep "$sleep_seconds"
        done

        max_attempts=3
        for attempt in $(seq 1 "$max_attempts"); do
          if devenv shell pnpm install --frozen-lockfile; then
            break
          fi

          if [ "$attempt" -eq "$max_attempts" ]; then
            echo "::error::pnpm install failed after $attempt attempts"
            exit 1
          fi

          sleep_seconds=$((attempt * 10))
          echo "::warning::pnpm install failed (attempt $attempt/$max_attempts). Retrying in ${sleep_seconds}s..."
          sleep "$sleep_seconds"
        done
