[defaults]
warn_on_group_mismatch = true

[defaults.changelog]
path = "{{ path }}/CHANGELOG.md"
format = "keep_a_changelog"

[package.core]
path = "crates/core"
type = "cargo"

[package.web]
path = "packages/web"
type = "npm"

[ecosystems.cargo]
enabled = true

[ecosystems.cargo.publish]
enabled = true
mode = "builtin"
trusted_publishing = false

[ecosystems.npm]
enabled = true

[ecosystems.npm.publish]
enabled = true
mode = "builtin"
registry = "npm"
trusted_publishing = true

[package.core.publish.placeholder]
readme_file = "docs/core-placeholder.md"

[package.web.publish.placeholder]
readme_file = "docs/web-placeholder.md"

[lints]
use = ["cargo/recommended", "npm/recommended"]
