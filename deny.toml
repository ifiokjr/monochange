# Configuration for cargo-deny
# See https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []
all-features = true
exclude = ["monochange_book"]

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
	# Pulled in by octocrab/jsonwebtoken. monochange uses personal-token auth only,
	# and there is no patched release available yet.
	"RUSTSEC-2023-0071",
]

[licenses]
allow = [
	"MIT",
	"Apache-2.0",
	"Unlicense",
	"Unicode-3.0",
	"BSL-1.0",
	"BSD-3-Clause",
	"ISC",
	"CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
skip = [
	# These remain duplicated through transitive dependencies outside the workspace's
	# direct control. Track them explicitly so cargo-deny stays focused on new
	# duplicate introductions.
	"core-foundation@0.9.4",
	"getrandom@0.2.17",
	"getrandom@0.4.2",
	"r-efi@5.3.0",
	"thiserror@1.0.69",
	"thiserror-impl@1.0.69",
	"unicode-width@0.1.14",
	"windows-sys@0.45.0",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
