# Configuration for cargo-deny
# See https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []
all-features = true
exclude = ["monochange_book"]

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
	# Pulled in by octocrab/jsonwebtoken. monochange uses personal-token auth only,
	# and there is no patched release available yet.
	"RUSTSEC-2023-0071",
]

[licenses]
allow = [
	"MIT",
	"Apache-2.0",
	"Unlicense",
	"Unicode-3.0",
	"BSL-1.0",
	"BSD-3-Clause",
	"ISC",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
