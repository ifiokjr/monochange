name: workflow-dispatch-release

on:
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: install cargo-binstall
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-binstall

      - name: install mc
        run: cargo binstall monochange --no-confirm

      - name: configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: find release pull request
        id: find_pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Default branch prefix used by monochange release PRs.
          # Override by setting BRANCH_PREFIX environment variable.
          prefix="${BRANCH_PREFIX:-monochange/release}"

          # List open PRs and filter for release branch prefix.
          pr_json=$(
            gh pr list \
              --repo "$GITHUB_REPOSITORY" \
              --state open \
              --json number,headRefName,title \
              --jq "map(select(.headRefName | startswith(\"$prefix\")))"
          )

          count=$(echo "$pr_json" | jq 'length')

          if [ "$count" -eq 0 ]; then
            echo "No open release pull request found for branch prefix: $prefix" >&2
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Take the first matching PR.
          pr_number=$(echo "$pr_json" | jq -r '.[0].number')
          pr_branch=$(echo "$pr_json" | jq -r '.[0].headRefName')
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "pr_branch=$pr_branch" >> "$GITHUB_OUTPUT"
          echo "Found release PR #$pr_number (branch: $pr_branch)"

      - name: checkout PR branch
        if: steps.find_pr.outputs.found == 'true'
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ steps.find_pr.outputs.pr_number }}/head
          fetch-depth: 0

      - name: merge release pull request
        if: steps.find_pr.outputs.found == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mc merge-release-pr \
            --pr-number ${{ steps.find_pr.outputs.pr_number }} \
            --author ${{ github.actor }}
