# Fly.io application configuration for monochange_app
# Replace APP_NAME with your actual app name after running `fly apps create`

app = "monochange-app"
primary_region = "lhr"

[build]
dockerfile = "./Dockerfile"

[env]
LEPTOS_SITE_ADDR = "0.0.0.0:3000"
RUST_LOG = "info"
# Required secrets (set with `fly secrets set`):
#   DATABASE_URL
#   JWT_SECRET
#   GITHUB_CLIENT_ID
#   GITHUB_CLIENT_SECRET

[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = true
auto_start_machines = true
min_machines_running = 0
processes = ["app"]

[http_service.concurrency]
type = "connections"
hard_limit = 250
soft_limit = 200

[[http_service.checks]]
interval = "10s"
timeout = "2s"
grace_period = "5s"
method = "GET"
path = "/health"
protocol = "http"

[[vm]]
size = "shared-cpu-1x"
memory = "512mb"
