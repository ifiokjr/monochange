clean:
  enabled: true
  keep:
    - CARGO_PROFILE_RELEASE_CODEGEN_UNITS
    - CARGO_PROFILE_RELEASE_LTO
    - CARGO_PROFILE_RELEASE_STRIP
    - CARGO_REGISTRY_TOKEN
    - CHANGED_FILES
    - CI
    - GH_TOKEN
    - GITHUB_COMMIT_TOKEN
    - GITHUB_ENV
    - GITHUB_OUTPUT
    - GITHUB_REPOSITORY
    - GITHUB_TOKEN
    - HOME
    - MONOCHANGE_ALLOW_BENCHMARK_BUDGET_FAILURES
    - MONOCHANGE_PATCH_COVERAGE_BASE
    - MONOCHANGE_PATCH_COVERAGE_HEAD
    - PR_LABELS_JSON
    - RELEASE_TAG
    - RUNNER_TEMP
    - SHELL
    - TERM
    - USER

inputs:
  git-hooks:
    url: github:cachix/git-hooks.nix
    inputs:
      nixpkgs:
        follows: nixpkgs
  ifiokjr-nixpkgs:
    url: github:ifiokjr/nixpkgs
  nixpkgs:
    url: github:NixOS/nixpkgs/nixpkgs-unstable
  rust-overlay:
    url: github:oxalica/rust-overlay
    overlays:
      - default
allow_unfree: true
