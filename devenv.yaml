clean:
  enabled: true
  keep: ["HOME", "USER", "SHELL", "TERM", "CI"]
inputs:
  git-hooks:
    url: github:cachix/git-hooks.nix
    inputs:
      nixpkgs:
        follows: nixpkgs
  ifiokjr-nixpkgs:
    url: github:ifiokjr/nixpkgs
  nixpkgs:
    url: github:NixOS/nixpkgs/nixpkgs-unstable
  rust-overlay:
    url: github:oxalica/rust-overlay
    overlays:
      - default
allow_unfree: true
