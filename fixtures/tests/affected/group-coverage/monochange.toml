[defaults]
package_type = "cargo"

[changesets.verify]
enabled = true
required = true

[group.main]
packages = ["core", "other"]

[package.core]
path = "crates/core"

[package.other]
path = "crates/other"

[cli.affected]
[[cli.affected.inputs]]
name = "format"
type = "choice"
choices = ["text", "json"]
default = "text"
[[cli.affected.inputs]]
name = "changed_paths"
type = "string_list"
[[cli.affected.inputs]]
name = "since"
type = "string"
[[cli.affected.inputs]]
name = "verify"
type = "boolean"
[[cli.affected.inputs]]
name = "label"
type = "string_list"
[[cli.affected.steps]]
type = "AffectedPackages"
inputs = { changed_paths = "{{ inputs.changed_paths }}", since = "{{ inputs.since }}", verify = "{{ inputs.verify }}", label = "{{ inputs.label }}" }
