[defaults]
parent_bump = "patch"
package_type = "cargo"

[package.core]
path = "crates/core"
extra_changelog_sections = [{ name = "Security", types = ["security"], default_bump = "patch" }]

[package.app]
path = "crates/app"

[group.sdk]
packages = ["core", "app"]
extra_changelog_sections = [{ name = "Testing", types = ["test"], default_bump = "minor" }]
