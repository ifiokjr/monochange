[defaults]
parent_bump = "patch"
package_type = "cargo"

[changelog.sections.security]
heading = "Security"
priority = 40

[changelog.sections.testing]
heading = "Testing"
priority = 40

[changelog.types.security]
section = "security"
bump = "patch"

[changelog.types.test]
section = "testing"
bump = "minor"

[package.core]
path = "crates/core"

[package.app]
path = "crates/app"

[group.sdk]
packages = ["core", "app"]