[defaults]
parent_bump = "patch"
package_type = "cargo"
changelog = "{{ path }}/CHANGELOG.md"

[changelog.sections.security]
heading = "Security"
priority = 40

[changelog.sections.testing]
heading = "Testing"
priority = 40

[changelog.types.security]
section = "security"
bump = "patch"

[changelog.types.test]
section = "testing"
bump = "minor"

[package.core]
path = "crates/core"

[package.app]
path = "crates/app"

[group.sdk]
packages = ["core", "app"]
changelog = "CHANGELOG.md"
versioned_files = [{ path = "group.toml", type = "cargo" }]
tag = true
release = true
version_format = "primary"

[ecosystems.cargo]
enabled = true

[cli.validate]

[[cli.validate.steps]]
type = "Validate"

[cli.release]

[[cli.release.inputs]]
name = "format"
type = "choice"
choices = ["text", "json"]
default = "text"

[[cli.release.steps]]
type = "PrepareRelease"