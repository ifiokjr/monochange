[defaults]
parent_bump = "patch"
package_type = "cargo"
changelog = "{{ path }}/CHANGELOG.md"

[package.core]
path = "crates/core"
extra_changelog_sections = [{ name = "Security", types = ["security"], default_bump = "patch" }]

[package.app]
path = "crates/app"

[group.sdk]
packages = ["core", "app"]
changelog = "CHANGELOG.md"
versioned_files = [{ path = "group.toml", type = "cargo" }]
extra_changelog_sections = [{ name = "Testing", types = ["test"], default_bump = "minor" }]
tag = true
release = true
version_format = "primary"

[ecosystems.cargo]
enabled = true

[cli.validate]

[[cli.validate.steps]]
type = "Validate"

[cli.release]

[[cli.release.inputs]]
name = "format"
type = "choice"
choices = ["text", "json"]
default = "text"

[[cli.release.steps]]
type = "PrepareRelease"
