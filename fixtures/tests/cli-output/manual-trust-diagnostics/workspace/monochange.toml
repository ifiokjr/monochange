[source]
provider = "github"
owner = "ifiokjr"
repo = "monochange"

[package.core]
path = "crates/core"
type = "cargo"

[package.core.publish]
enabled = true
mode = "builtin"
trusted_publishing = true

[package.jsr_pkg]
path = "packages/jsr-pkg"
type = "deno"

[package.jsr_pkg.publish]
enabled = true
mode = "builtin"
trusted_publishing = true

[package.dart_pkg]
path = "packages/dart-pkg"
type = "dart"

[package.dart_pkg.publish]
enabled = true
mode = "builtin"
trusted_publishing = true
