[defaults]
parent_bump = "patch"
package_type = "cargo"

[defaults.changelog]
path = "{{ path }}/CHANGELOG.md"
format = "keep_a_changelog"

[package.core]
path = "crates/core"

[package.app]
path = "crates/app"

[group.sdk]
packages = ["core", "app"]
release = true
tag = true
version_format = "primary"

[group.sdk.changelog]
path = "docs/sdk-CHANGELOG.md"
include = ["core"]

[ecosystems.cargo]
enabled = true

[cli.release]

[[cli.release.steps]]
type = "PrepareRelease"
