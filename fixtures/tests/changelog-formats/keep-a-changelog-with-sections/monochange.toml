[defaults]
parent_bump = "patch"
package_type = "cargo"

[defaults.changelog]
path = "{{ path }}/CHANGELOG.md"
format = "keep_a_changelog"

[changelog]
templates = ["- {{ summary }}"]

[changelog.sections.features]
heading = "Features"
priority = 10

[changelog.sections.fixes]
heading = "Bug Fixes"
priority = 20

[changelog.types.feat]
section = "features"
bump = "minor"

[changelog.types.fix]
section = "fixes"
bump = "patch"

[package.core]
path = "crates/core"

[package.app]
path = "crates/app"

[group.sdk]
packages = ["core", "app"]
release = true
tag = true
version_format = "primary"

[group.sdk.changelog]
path = "docs/sdk-CHANGELOG.md"
format = "keep_a_changelog"

[ecosystems.cargo]
enabled = true

[cli.release]

[[cli.release.steps]]
type = "PrepareRelease"
