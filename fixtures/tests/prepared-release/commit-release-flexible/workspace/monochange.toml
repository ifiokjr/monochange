[defaults]
package_type = "cargo"
changelog = "{{ path }}/CHANGELOG.md"

[package.core]
path = "crates/core"
tag = true
release = true

[source]
provider = "github"
owner = "ifiokjr"
repo = "monochange"

[source.releases]
source = "github_generated"
generate_notes = true

[source.pull_requests]
base = "main"
branch_prefix = "monochange/release"
labels = ["release"]
auto_merge = true

[ecosystems.cargo]
enabled = true

[cli.release]

[[cli.release.inputs]]
name = "format"
type = "choice"
choices = ["text", "json"]
default = "text"

[[cli.release.steps]]
type = "PrepareRelease"
inputs = ["format"]

[cli.commit-from-cache]

[[cli.commit-from-cache.inputs]]
name = "format"
type = "choice"
choices = ["text", "json"]
default = "text"

[[cli.commit-from-cache.steps]]
type = "CommitRelease"
update_release_json = true

[cli.release-with-manifest]

[[cli.release-with-manifest.inputs]]
name = "format"
type = "choice"
choices = ["text", "json"]
default = "text"

[[cli.release-with-manifest.steps]]
type = "PrepareRelease"
inputs = ["format"]

[[cli.release-with-manifest.steps]]
type = "CommitRelease"
update_release_json = true
