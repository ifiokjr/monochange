[defaults]
package_type = "cargo"

[defaults.changelog]
path = "{{ path }}/CHANGELOG.md"
format = "monochange"

[changelog]
templates = [
  "#### {{ summary }}\n\n{{ details }}\n\n{{ context }}",
  "#### {{ summary }}\n\n{{ context }}",
  "- {{ summary }}",
]

[package.core]
path = "crates/core"

[cli.release]
help_text = "Prepare a release and refresh the cached release manifest"

[[cli.release.inputs]]
name = "format"
type = "choice"
choices = ["text", "json"]
default = "text"

[[cli.release.steps]]
type = "PrepareRelease"
inputs = ["format"]

[cli.diagnostics]
help_text = "Show changeset diagnostics and context"

[[cli.diagnostics.inputs]]
name = "format"
type = "choice"
choices = ["text", "json"]
default = "text"

[[cli.diagnostics.inputs]]
name = "changeset"
type = "string_list"

[[cli.diagnostics.steps]]
type = "DiagnoseChangesets"
inputs = ["format", "changeset"]
