[defaults]
package_type = "npm"
changelog = false

[package.app]
path = "packages/app"

[ecosystems.npm]
lockfile_commands = [{ command = "custom-lock", cwd = "packages/app", shell = true }]

[cli.release]

[[cli.release.inputs]]
name = "format"
type = "choice"
choices = ["text", "json"]
default = "text"

[[cli.release.steps]]
type = "PrepareRelease"
inputs = ["format"]
