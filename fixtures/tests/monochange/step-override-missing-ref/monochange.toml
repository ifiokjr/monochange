[defaults]
package_type = "cargo"

[changesets.verify]
enabled = true
required = false
skip_labels = ["no-changeset-required"]
comment_on_failure = false

[package.core]
path = "crates/core"
ignored_paths = ["tests/**"]
additional_paths = ["Cargo.lock"]

[cli.pr-check]

[[cli.pr-check.steps]]
type = "AffectedPackages"
inputs = { changed_paths = "{{ inputs.nonexistent }}", verify = false, format = "json" }
