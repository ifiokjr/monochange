[defaults]
parent_bump = "patch"
package_type = "cargo"
changelog = "{{ path }}/changelog.md"

[package.core]
path = "crates/core"
versioned_files = [{ path = "crates/core/extra.toml", type = "cargo" }]

[package.app]
path = "crates/app"

[group.sdk]
packages = ["core", "app"]
changelog = "changelog.md"
versioned_files = [{ path = "group.toml", type = "cargo" }]
tag = true
release = true
version_format = "primary"

[ecosystems.cargo]
enabled = true

[cli.release]

[[cli.release.inputs]]
name = "format"
type = "choice"
choices = ["text", "json"]
default = "text"

[[cli.release.steps]]
type = "PrepareRelease"

[cli.progress-failure]
help_text = "Exercise progress output"
steps = [
	{ type = "Validate", name = "skip validate", when = "{{ false }}" },
	{ type = "Command", name = "stderr only", shell = true, command = "printf 'warn line\n' >&2" },
	{ type = "Command", name = "fail loud", shell = true, command = "printf 'bad line\n' >&2; exit 3" },
]
