[defaults]
package_type = "npm"
changelog = false

[package.app]
path = "packages/app"
versioned_files = [{ path = "lockfiles/shared/package-lock.json", type = "npm" }]

[cli.release]

[[cli.release.inputs]]
name = "format"
type = "choice"
choices = ["text", "json"]
default = "text"

[[cli.release.steps]]
type = "PrepareRelease"
inputs = ["format"]
