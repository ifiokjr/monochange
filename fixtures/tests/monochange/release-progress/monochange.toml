[defaults]
parent_bump = "patch"
package_type = "cargo"
changelog = "{{ path }}/changelog.md"

[package.core]
path = "crates/core"
versioned_files = [{ path = "crates/core/extra.toml", type = "cargo" }]

[package.app]
path = "crates/app"

[group.sdk]
packages = ["core", "app"]
changelog = "changelog.md"
versioned_files = [{ path = "group.toml", type = "cargo" }]
tag = true
release = true
version_format = "primary"

[ecosystems.cargo]
enabled = true

[cli.release]

[[cli.release.inputs]]
name = "format"
type = "choice"
choices = ["text", "json"]
default = "text"

[[cli.release.steps]]
type = "PrepareRelease"

[cli.progress-release]
help_text = "Exercise progress output"
steps = [
  { type = "PrepareRelease", name = "plan release" },
  { type = "Command", name = "stream summary", shell = true, command = "printf 'streamed line 1\n'; sleep 0.01; printf 'streamed line 2\n'" },
]

[cli.progress-ascii]
help_text = "Exercise progress output"
steps = [
  { type = "PrepareRelease", name = "plan release" },
  { type = "Command", name = "stream summary", shell = true, command = "printf 'line one\n\nline three\n'" },
]

[cli.progress-json]
help_text = "Exercise progress output"
steps = [
  { type = "PrepareRelease", name = "plan release" },
  { type = "Command", name = "stream summary", shell = true, command = "printf 'stdout line\n'; printf 'stderr line\n' >&2" },
]
