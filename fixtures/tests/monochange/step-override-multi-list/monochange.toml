[defaults]
package_type = "cargo"

[changesets.affected]
enabled = true
required = true
skip_labels = ["no-changeset-required"]
comment_on_failure = true

[package.core]
path = "crates/core"
ignored_paths = ["tests/**"]
additional_paths = ["Cargo.lock"]

[cli.pr-check]

[[cli.pr-check.inputs]]
name = "paths"
type = "string_list"
required = true

[[cli.pr-check.steps]]
type = "AffectedPackages"
inputs = { changed_paths = "{{ inputs.paths }}", verify = false, format = "json" }
