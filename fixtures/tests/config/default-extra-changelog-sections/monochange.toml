[defaults]
package_type = "cargo"

[changelog]
templates = [
    "#### {{ summary }} ({{ package }} {{ bump }})\n\n{{ details }}\n\n{{ context }}",
    "#### {{ summary }}\n\n_Owner:_ {{ change_owner_link }}\n_PR:_ {{ review_request_link }}\n_Closed issues:_ {{ closed_issue_links }}",
    "- {{ summary }}"
]

[changelog.sections.security]
heading = "Security"
priority = 40

[changelog.types.security]
section = "security"
bump = "patch"

[package.core]
path = "crates/core"