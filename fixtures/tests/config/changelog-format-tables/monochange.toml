[defaults]
package_type = "cargo"

[defaults.changelog]
path = "{{ path }}/CHANGELOG.md"
format = "keep_a_changelog"

[package.core]
path = "crates/core"

[package.app]
path = "crates/app"

[package.app.changelog]
path = "docs/app-release-notes.md"
format = "monochange"

[group.sdk]
packages = ["core", "app"]

[group.sdk.changelog]
path = "docs/group-release-notes.md"
format = "keep_a_changelog"
