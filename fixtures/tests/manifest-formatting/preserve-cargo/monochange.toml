[defaults]
parent_bump = "patch"
package_type = "cargo"
changelog = false

[package.core]
path = "crates/core"
versioned_files = [{ path = "crates/core/extra.toml", type = "cargo" }]

[package.app]
path = "crates/app"

[group.main]
packages = ["core", "app"]
versioned_files = [
  { path = "group.toml", type = "cargo" },
  { path = "Cargo.toml", type = "cargo", fields = ["workspace.metadata.bin.monochange.version"] },
]
tag = true
release = true
version_format = "primary"

[ecosystems.cargo]
enabled = true

[cli.release]

[[cli.release.steps]]
type = "PrepareRelease"
