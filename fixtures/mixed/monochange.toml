[defaults]
parent_bump = "patch"

[package.sdk-core]
path = "cargo/sdk-core"
type = "cargo"
extra_changelog_sections = [{ name = "Security", types = ["security"], default_bump = "patch" }]

[package.web-sdk]
path = "packages/web-sdk"
type = "npm"

[package.deno-tool]
path = "deno/tool"
type = "deno"

[package.mobile-sdk]
path = "dart/mobile_sdk"
type = "dart"

[group.sdk]
packages = ["sdk-core", "web-sdk"]
