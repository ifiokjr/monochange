[defaults]
package_type = "cargo"

[changesets.affected]
enabled = true
required = true
skip_labels = ["no-changeset-required"]

[package.core]
path = "crates/core"

[package.other]
path = "crates/other"

[cli.affected]
[[cli.affected.inputs]]
name = "format"
type = "choice"
choices = ["text", "json"]
default = "text"
[[cli.affected.inputs]]
name = "changed_paths"
type = "string_list"
[[cli.affected.inputs]]
name = "from"
type = "string"
[[cli.affected.inputs]]
name = "verify"
type = "boolean"
[[cli.affected.inputs]]
name = "label"
type = "string_list"
[[cli.affected.steps]]
type = "AffectedPackages"
