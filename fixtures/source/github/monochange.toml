[defaults]
package_type = "cargo"
changelog = "{{ path }}/CHANGELOG.md"

[package.core]
path = "crates/core"
tag = true
release = true

[source]
provider = "github"
owner = "ifiokjr"
repo = "monochange"

[source.releases]
source = "github_generated"
generate_notes = true

[source.pull_requests]
base = "main"
branch_prefix = "monochange/release"
labels = ["release"]
auto_merge = true

[ecosystems.cargo]
enabled = true

[cli.publish-release]

[[cli.publish-release.inputs]]
name = "format"
type = "choice"
choices = ["text", "json"]
default = "text"

[[cli.publish-release.inputs]]
name = "from-ref"
type = "string"
default = "HEAD"

[[cli.publish-release.inputs]]
name = "draft"
type = "boolean"
default = false

[[cli.publish-release.steps]]
type = "PrepareRelease"
inputs = ["format"]

[[cli.publish-release.steps]]
type = "PublishRelease"
inputs = ["format", "from-ref", "draft"]

[cli.release-pr]

[[cli.release-pr.inputs]]
name = "format"
type = "choice"
choices = ["text", "json"]
default = "text"

[[cli.release-pr.steps]]
type = "PrepareRelease"
inputs = ["format"]

[[cli.release-pr.steps]]
type = "OpenReleaseRequest"
inputs = ["format"]

[cli.release-comments]

[[cli.release-comments.inputs]]
name = "format"
type = "choice"
choices = ["text", "json"]
default = "text"

[[cli.release-comments.inputs]]
name = "auto-close-issues"
type = "boolean"
default = false

[[cli.release-comments.steps]]
type = "PrepareRelease"
inputs = ["format"]

[[cli.release-comments.steps]]
type = "CommentReleasedIssues"
inputs = ["format", "auto-close-issues"]
